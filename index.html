<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한국어 단어 테스트</title>
<style>
:root{
  --bg:#000; --panel:#16181c; --panel2:#1f2125; --gray:#26282d; --gray-h:#33363c;
  --line:#2a2d33; --text:#f2f3f5; --mute:#8b909a; --faint:#5c616b;
  --red:#ff3b3b; --blue:#2f8bff; --green:#4cd964; --gold:#ffc83c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo","Noto Sans CJK JP","Noto Sans KR",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{display:flex;justify-content:center}
.app{width:100%;max-width:520px;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}

button{font-family:inherit}
.hidden{display:none!important}

/* ===== screens ===== */
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

/* ===== top bar (quiz) ===== */
.qbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;font-size:13px;color:var(--mute);font-weight:700}
.qbar .prog{letter-spacing:.5px}
.qbar .time{color:var(--mute);font-variant-numeric:tabular-nums}
.tbar{height:3px;margin:8px 18px 0;background:var(--gray);border-radius:3px;overflow:hidden}
.tfill{height:100%;width:100%;background:var(--faint);transition:width .1s linear}
.tfill.warn{background:var(--mute)}

/* ===== question ===== */
.qstage{flex:1;display:flex;flex-direction:column;min-height:0}
.qmain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8vh 20px 0;text-align:center}
.qword{font-size:clamp(34px,9vw,46px);font-weight:800;line-height:1.25;word-break:break-all}
.qbottom{padding:0 18px calc(18px + env(safe-area-inset-bottom))}

/* choices */
.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.choice{background:var(--gray);border:none;border-radius:0;padding:18px;font-size:19px;font-weight:700;color:var(--text);
  text-align:center;cursor:pointer;transition:background .12s,transform .08s;min-height:60px}
.choice:active{transform:scale(.98);background:var(--gray-h)}

/* unknown btn */
.unknown{display:block;margin:0 auto;background:var(--gray);border:1px solid var(--line);color:var(--text);
  font-size:13px;font-weight:600;padding:9px 22px;border-radius:0;cursor:pointer}
.unknown:active{background:#141518}

/* ===== overlay symbol ===== */
/* 横:中央 / 縦:中央から画面高の20%上へ / 大きさ1.3倍(46→60vw) / 線2倍(font-weight倍+text-stroke) / 透明度.6維持 */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:auto;background:rgba(0,0,0,.72)}
.ovsym{font-size:60vw;line-height:1;font-weight:600;opacity:.6;transform:translateY(-20vh)}
.ovsym.o{color:var(--red);-webkit-text-stroke:1.4vw var(--red);text-stroke:1.4vw var(--red)}
.ovsym.x{color:var(--blue);font-weight:400;-webkit-text-stroke:1.2vw var(--blue);text-stroke:1.2vw var(--blue)}
/* 不正解/わからない/時間切れ時に正解の単語を表示。問題と選択肢の間（画面中央）に配置 */
.ovans{position:absolute;left:0;right:0;top:52%;transform:translateY(-50%);text-align:center;padding:0 18px;pointer-events:none}
.ovans .oa-label{color:var(--mute);font-size:12px;font-weight:800;letter-spacing:3px;margin-bottom:8px}
.ovans .oa-ko{color:var(--text);font-size:clamp(30px,8vw,40px);font-weight:800;line-height:1.25;word-break:break-all}
.ovans .oa-ja{color:var(--mute);font-size:15px;font-weight:600;margin-top:6px}

/* ===== writing ===== */
.winput{margin:0 18px;min-height:58px;background:var(--panel);border:1px solid var(--line);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;letter-spacing:1px;padding:10px}
.wcaret{display:inline-block;width:2px;height:30px;background:var(--text);margin-left:2px;animation:blink 1s steps(1) infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
/* 韓国語キーボードは画面下部に固定。PCでは中央寄せ＋最大幅でアプリ幅に揃える */
.korean-keyboard{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line);z-index:50}
.krow{display:flex;gap:5px;justify-content:center;margin-bottom:6px}
.key{flex:1;min-width:0;background:var(--gray);border:none;border-radius:0;color:var(--text);font-size:18px;font-weight:600;
  padding:13px 0;cursor:pointer;min-height:46px}
.key:active{background:var(--gray-h)}
.key.wide{flex:1.5}
.key.fn{background:var(--panel2);color:var(--mute);font-size:13px;font-weight:700}
.key.shifton{background:var(--gray-h);color:var(--text);border:1px solid var(--line)}
.krow.ctrl .key{font-size:13px;font-weight:700;padding:13px 0}
.key.send{background:var(--gray);color:var(--text);border:1px solid var(--line)}
.key.dontknow{background:var(--gray);border:1px solid var(--line);color:var(--text)}
/* 濃音・合成母音の専用行：中央寄せ・キー幅を固定して詰めすぎないようにする */
.krow.extra{justify-content:center}
.krow.extra .key.ex{flex:0 1 48px;max-width:56px;background:var(--panel2);color:var(--text)}

/* ===== home ===== */
.home{padding:0 22px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.home h1{font-size:30px;font-weight:800;margin:0;text-align:center}
.home .sub{color:var(--mute);font-size:14px;text-align:center;line-height:1.7;margin:-4px 0 18px}
.btn{display:block;width:100%;border:none;border-radius:0;padding:17px;font-size:17px;font-weight:800;cursor:pointer;transition:transform .08s;color:var(--text)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--gray-h);color:var(--text);border:1px solid var(--line)}
.btn.ghost{background:var(--gray);color:var(--text)}
.btn.line{background:transparent;border:1px solid var(--line);color:var(--mute)}

/* ===== result (fixed, only list scrolls) ===== */
.res{height:100dvh;display:flex;flex-direction:column;padding:18px 18px calc(14px + env(safe-area-inset-bottom))}
.res-head{flex:0 0 auto;text-align:center}
.res-label{color:var(--mute);font-size:12px;letter-spacing:3px;font-weight:800}
.res-rank{font-size:74px;font-weight:900;line-height:1.05;margin:2px 0}
.rank-S{color:var(--gold)}.rank-A{color:var(--green)}.rank-B{color:var(--blue)}.rank-C{color:var(--text)}.rank-D{color:var(--mute)}
.res-score{font-size:24px;font-weight:800}
.res-stats{display:flex;justify-content:center;gap:18px;margin-top:8px;color:var(--mute);font-size:13px;font-weight:700;flex-wrap:wrap}
.res-stats b{color:var(--text);font-weight:800}
.res-listwrap{flex:1 1 auto;min-height:0;overflow-y:auto;margin:14px 0;border:1px solid var(--line);border-radius:12px;-webkit-overflow-scrolling:touch}
.rtab{width:100%;border-collapse:collapse;font-size:13px}
.rtab th,.rtab td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left}
.rtab th{position:sticky;top:0;background:var(--panel2);color:var(--mute);font-size:11px;font-weight:800;z-index:1}
.rtab td.no{color:var(--mute);text-align:right;width:34px}
.rtab td.ko{font-weight:700}
.rtab .r-ok{color:var(--green)}.rtab .r-ng{color:var(--blue)}.rtab .r-un{color:var(--mute)}.rtab .r-to{color:var(--gold)}
.res-btns{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.res-btns .btn{padding:14px;font-size:14px}
.res-btns .full{grid-column:1/3}

/* ===== generic page (history / curve) ===== */
.page{height:100dvh;display:flex;flex-direction:column;padding:16px 16px calc(12px + env(safe-area-inset-bottom))}
.page-head{flex:0 0 auto;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.page-head h2{font-size:20px;font-weight:800;margin:0}
.back{background:var(--gray);border:none;color:var(--text);width:38px;height:38px;border-radius:0;font-size:18px;cursor:pointer;flex:0 0 auto}
.page-body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.htab{width:100%;border-collapse:collapse;font-size:13px}
.htab th,.htab td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
.htab th{position:sticky;top:0;background:var(--bg);color:var(--mute);font-size:11px;font-weight:800}
.htab td.num{text-align:right;font-variant-numeric:tabular-nums}
.htab tr.click{cursor:pointer}
.htab tr.click:active{background:var(--panel)}
.rate-bad{color:var(--blue)}.rate-mid{color:var(--gold)}.rate-good{color:var(--green)}
.empty{color:var(--mute);text-align:center;padding:40px 20px;line-height:1.9;font-size:14px}
.note{background:#1a1407;border:1px solid #3a2e0a;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#e8c878;line-height:1.6;margin:10px 0}
.curve-stats{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.cstat{flex:1 1 44%;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px}
.cstat .k{color:var(--mute);font-size:11px;font-weight:700}
.cstat .v{font-size:17px;font-weight:800;margin-top:3px}
.chartbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 10px 8px}
.wdetail-head{margin-bottom:6px}
.wdetail-head .ko{font-size:26px;font-weight:800}
.wdetail-head .ja{color:var(--mute);font-size:14px;margin-top:2px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HOME -->
  <div class="screen on" id="s-home">
    <div class="home">
      <h1>한국어 단어 테스트</h1>
      <div class="sub">100語からランダム12問<br>四択10秒 / 書き取り20秒・満点100点</div>
      <button class="btn primary" onclick="startTest()">テストを始める</button>
      <button class="btn ghost" onclick="renderHistory()">学習履歴を見る</button>
      <button class="btn ghost" onclick="renderCurve()">忘却曲線を見る</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="s-quiz">
    <div class="qbar"><span class="prog" id="prog">1 / 12</span><span class="time" id="time">10.0</span></div>
    <div class="tbar"><div class="tfill" id="tfill"></div></div>
    <div class="qstage" id="qstage"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result"></div>
  <!-- HISTORY -->
  <div class="screen" id="s-history"></div>
  <!-- WORD DETAIL -->
  <div class="screen" id="s-wdetail"></div>
  <!-- CURVE -->
  <div class="screen" id="s-curve"></div>
</div>

/* ============================================================ ハングルIME（2ボル式 文字合成） ============================================================ */
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CHO_I={},JUNG_I={},JONG_I={};
CHO.forEach((c,i)=>CHO_I[c]=i);JUNG.forEach((c,i)=>JUNG_I[c]=i);JONG.forEach((c,i)=>{if(c)JONG_I[c]=i});
const COMB_JUNG={"ㅗㅏ":"ㅘ","ㅗㅐ":"ㅙ","ㅗㅣ":"ㅚ","ㅜㅓ":"ㅝ","ㅜㅔ":"ㅞ","ㅜㅣ":"ㅟ","ㅡㅣ":"ㅢ"};
const DEC_JUNG={"ㅘ":["ㅗ","ㅏ"],"ㅙ":["ㅗ","ㅐ"],"ㅚ":["ㅗ","ㅣ"],"ㅝ":["ㅜ","ㅓ"],"ㅞ":["ㅜ","ㅔ"],"ㅟ":["ㅜ","ㅣ"],"ㅢ":["ㅡ","ㅣ"]};
const COMB_JONG={"ㄱㅅ":"ㄳ","ㄴㅈ":"ㄵ","ㄴㅎ":"ㄶ","ㄹㄱ":"ㄺ","ㄹㅁ":"ㄻ","ㄹㅂ":"ㄼ","ㄹㅅ":"ㄽ","ㄹㅌ":"ㄾ","ㄹㅍ":"ㄿ","ㄹㅎ":"ㅀ","ㅂㅅ":"ㅄ"};
const DEC_JONG={"ㄳ":["ㄱ","ㅅ"],"ㄵ":["ㄴ","ㅈ"],"ㄶ":["ㄴ","ㅎ"],"ㄺ":["ㄹ","ㄱ"],"ㄻ":["ㄹ","ㅁ"],"ㄼ":["ㄹ","ㅂ"],"ㄽ":["ㄹ","ㅅ"],"ㄾ":["ㄹ","ㅌ"],"ㄿ":["ㄹ","ㅍ"],"ㅀ":["ㄹ","ㅎ"],"ㅄ":["ㅂ","ㅅ"]};
const isVowel=j=>JUNG_I[j]!==undefined;
const isValidJong=j=>JONG_I[j]!==undefined;

const IME={
  cho:null,jung:null,jong:null,committed:"",
  reset(){this.cho=this.jung=this.jong=null;this.committed="";},
  _renderBlock(cho,jung,jong){
    if(cho===null&&jung===null)return"";
    if(cho!==null&&jung===null)return cho;
    if(cho===null&&jung!==null)return jung;
    const ti=jong?JONG_I[jong]:0;
    return String.fromCharCode(0xAC00+(CHO_I[cho]*21+JUNG_I[jung])*28+ti);
  },
  _render(){return this._renderBlock(this.cho,this.jung,this.jong);},
  text(){return this.committed+this._render();},
  commit(){this.committed+=this._render();this.cho=this.jung=this.jong=null;},
  input(j){ isVowel(j)?this._vowel(j):this._cons(j); },
  _cons(j){
    if(this.cho===null&&this.jung===null&&this.jong===null){this.cho=j;return;}
    if(this.cho!==null&&this.jung===null){this.commit();this.cho=j;return;}
    if(this.cho===null&&this.jung!==null){this.commit();this.cho=j;return;}
    if(this.jong===null){
      if(isValidJong(j))this.jong=j; else{this.commit();this.cho=j;}
      return;
    }
    const c=COMB_JONG[this.jong+j];
    if(c)this.jong=c; else{this.commit();this.cho=j;}
  },
  _vowel(j){
    if(this.cho===null&&this.jung===null){this.jung=j;return;}
    if(this.cho!==null&&this.jung===null){this.jung=j;return;}
    if(this.jong===null){
      const c=COMB_JUNG[this.jung+j];
      if(c)this.jung=c; else{this.commit();this.jung=j;}
      return;
    }
    // 終声あり → 終声の最後の子音を次の音節の初声へ移動
    const d=DEC_JONG[this.jong];
    let baseJong,movedCho;
    if(d){baseJong=d[0];movedCho=d[1];} else {baseJong=null;movedCho=this.jong;}
    this.committed+=this._renderBlock(this.cho,this.jung,baseJong);
    this.cho=movedCho;this.jung=j;this.jong=null;
  },
  space(){this.commit();this.committed+=" ";},
  backspace(){
    if(this.jong!==null){const d=DEC_JONG[this.jong];this.jong=d?d[0]:null;return;}
    if(this.jung!==null){const d=DEC_JUNG[this.jung];this.jung=d?d[0]:null;return;}
    if(this.cho!==null){this.cho=null;return;}
    if(this.committed.length>0){
      const last=this.committed[this.committed.length-1];
      this.committed=this.committed.slice(0,-1);
      const code=last.charCodeAt(0);
      if(code>=0xAC00&&code<=0xD7A3){
        const s=code-0xAC00;
        this.cho=CHO[Math.floor(s/(21*28))];
        this.jung=JUNG[Math.floor((s%(21*28))/28)];
        const ti=s%28;this.jong=ti?JONG[ti]:null;
        this.backspace();
      }
    }
  }
};

/* ============================================================ ストレージ（全件保存） ============================================================ */
const LS_HIST="kwt_history_v1", LS_PERFECT="kwt_perfect_v1", LS_USER="kwt_user_v1";
function getUserId(){let u=localStorage.getItem(LS_USER);if(!u){u="u-"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);localStorage.setItem(LS_USER,u);}return u;}
function loadHistory(){try{return JSON.parse(localStorage.getItem(LS_HIST)||"[]");}catch(e){return[];}}
function saveAnswer(rec){const h=loadHistory();h.push(rec);localStorage.setItem(LS_HIST,JSON.stringify(h));}
function getPerfectCount(){return parseInt(localStorage.getItem(LS_PERFECT)||"0",10);}
function incPerfectCount(){const n=getPerfectCount()+1;localStorage.setItem(LS_PERFECT,String(n));return n;}

/* ============================================================ 韓国語音声（正解時のみ） ============================================================ */
/* 既存の音声ファイルが word.audio に登録されていればそれを優先。無ければSpeechSynthesisで ko-KR 読み上げ。 */
let _koVoice=null,_curAudio=null;
function _pickKoVoice(){
  if(!('speechSynthesis' in window))return;
  const vs=window.speechSynthesis.getVoices()||[];
  _koVoice=vs.find(v=>v.lang==="ko-KR")||vs.find(v=>v.lang&&v.lang.toLowerCase().replace("_","-").indexOf("ko")===0)||null;
}
if('speechSynthesis' in window){_pickKoVoice();window.speechSynthesis.onvoiceschanged=_pickKoVoice;}
function stopSpeak(){
  try{ if('speechSynthesis' in window)window.speechSynthesis.cancel(); }catch(e){}
  try{ if(_curAudio){_curAudio.pause();_curAudio.currentTime=0;_curAudio=null;} }catch(e){}
}
function speakKorean(word){
  // 再生失敗してもテストは止めない（全てtry/catchで握りつぶす）
  try{
    stopSpeak(); // 前の問題の音声が残っていれば停止し、重複再生を防ぐ
    if(word&&word.audio){
      const a=new Audio(word.audio);_curAudio=a;
      a.play().catch(()=>{ _speakTTS(word.ko); }); // ファイル再生失敗時はTTSへフォールバック
      return;
    }
    _speakTTS(word?word.ko:"");
  }catch(e){}
}
function _speakTTS(text){
  try{
    if(!('speechSynthesis' in window)||!text)return;
    if(!_koVoice)_pickKoVoice();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ko-KR";u.rate=0.9;u.pitch=1.0;
    if(_koVoice)u.voice=_koVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ============================================================ 出題ロジック ============================================================ */
const PLAN=[...Array(5).fill("jk"),...Array(5).fill("kj"),...Array(2).fill("w")];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}
function buildQuestions(){
  const picked=sample(WORDS,12);
  return picked.map((w,i)=>{
    const type=PLAN[i];
    let choices=null,correct;
    if(type==="kj"){correct=w.ja;choices=shuffle([w.ja,...w.d.slice(0,3)]);}
    else if(type==="jk"){correct=w.ko;choices=shuffle([w.ko,...sample(WORDS.filter(x=>x.id!==w.id),3).map(x=>x.ko)]);}
    else{correct=w.ko;}
    return {word:w,type,choices,correct};
  });
}
const DIRECTION={jk:"jp_to_kr",kj:"kr_to_jp",w:"jp_to_kr"};
const ANS_TYPE={jk:"choice",kj:"choice",w:"writing"};

/* 採点 */
function scoreFor(type,isCorrect,t){
  if(!isCorrect)return 0;
  if(type==="w")return t<10?10:9;        // 書き取り：10秒未満=10, 10〜20=9
  return t<5?8:7;                        // 四択：5秒未満=8, 5〜10=7
}
function rankFor(s){if(s===100)return"S";if(s<=50)return"D";if(s<=70)return"C";if(s<=80)return"B";return"A";}

/* ============================================================ 画面遷移 ============================================================ */
function show(id){document.querySelectorAll(".screen").forEach(e=>e.classList.remove("on"));document.getElementById(id).classList.add("on");window.scrollTo(0,0);}

/* ============================================================ テスト進行 ============================================================ */
let state=null,timer=null,qStart=0,answered=false;

function startTest(){
  state={questions:buildQuestions(),idx:0,results:[],testId:"t-"+Date.now().toString(36),userId:getUserId()};
  renderQuestion();
  show("s-quiz");
}

function curLimit(){return state.questions[state.idx].type==="w"?20:10;}

function startTimer(){
  qStart=performance.now();answered=false;
  const limit=curLimit(),fill=document.getElementById("tfill"),tt=document.getElementById("time");
  clearInterval(timer);
  const tick=()=>{
    const el=(performance.now()-qStart)/1000, remain=Math.max(0,limit-el);
    fill.style.width=(remain/limit*100)+"%";
    fill.className="tfill"+(remain<=limit*0.3?" warn":"");
    tt.textContent=remain.toFixed(1);
    if(remain<=0){clearInterval(timer);if(!answered)submit("timeout","");}
  };
  tick();timer=setInterval(tick,100);
}

function renderQuestion(){
  // 遷移時に音声を止めない（長い単語が途中で切れないよう最後まで再生させる）。
  // 重複防止は次の正解時に speakKorean() 側の stopSpeak() が担う。
  const q=state.questions[state.idx];
  document.getElementById("prog").textContent=(state.idx+1)+" / 12";
  const stage=document.getElementById("qstage");
  if(q.type==="kj"||q.type==="jk"){
    const display=q.type==="kj"?q.word.ko:q.word.ja;
    stage.innerHTML=`
      <div class="qmain"><div class="qword">${esc(display)}</div></div>
      <div class="qbottom">
        <div class="choices">${q.choices.map(c=>`<button class="choice" data-v="${esc(c)}" onclick="pick(this.dataset.v)">${esc(c)}</button>`).join("")}</div>
        <button class="unknown" onclick="submit('unknown','')">わからない</button>
      </div>`;
  }else{
    IME.reset();
    stage.innerHTML=`
      <div class="qmain" style="flex:0 0 auto;padding-top:5vh;min-height:26vh"><div class="qword">${esc(q.word.ja)}</div></div>
      <div class="winput" id="winput"></div>
      ${keyboardHTML()}`;
    refreshInput();
  }
  startTimer();
}

function pick(v){const q=state.questions[state.idx];submit(v===q.correct?"correct":"incorrect",v);}

/* 回答送信（二重送信防止） */
function submit(status,userAnswer){
  if(answered)return;answered=true;clearInterval(timer);
  const q=state.questions[state.idx],limit=q.type==="w"?20:10;
  let elapsed=(performance.now()-qStart)/1000;
  if(status==="timeout")elapsed=limit; else if(elapsed>limit){elapsed=limit;status= status==="correct"?"timeout":status;}
  const isCorrect=status==="correct";
  const score=scoreFor(q.type,isCorrect,elapsed);
  const rec={
    userId:state.userId,wordId:q.word.id,testId:state.testId,questionNumber:state.idx+1,
    korean:q.word.ko,japanese:q.word.ja,answerType:ANS_TYPE[q.type],direction:DIRECTION[q.type],
    userAnswer:userAnswer||"",correctAnswer:q.correct,answerStatus:status,isCorrect,
    responseTimeMs:Math.round(elapsed*1000),score,answeredAt:new Date().toISOString()
  };
  state.results.push(rec);saveAnswer(rec);
  if(isCorrect)speakKorean(q.word); // 正解時のみ韓国語音声を再生（不正解/わからない/時間切れは再生しない）
  showOverlay(isCorrect,q);
}

/* ○×オーバーレイ（不正解時は正解の単語も表示） */
function showOverlay(isCorrect,q){
  const ov=document.createElement("div");ov.className="overlay";
  let ans="";
  if(!isCorrect){
    const w=q.word;
    // 韓→日(kj)は日本語が正解表示／日→韓(jk)・書き取り(w)は韓国語が正解表示
    const main=q.type==="kj"?w.ja:w.ko;
    const sub =q.type==="kj"?w.ko:w.ja;
    ans=`<div class="ovans"><div class="oa-label">正解</div><div class="oa-ko">${esc(main)}</div><div class="oa-ja">${esc(sub)}</div></div>`;
  }
  ov.innerHTML=`<div class="ovsym ${isCorrect?"o":"x"}">${isCorrect?"○":"×"}</div>${ans}`;
  document.body.appendChild(ov);
  setTimeout(()=>{ov.remove();afterAnswer();},isCorrect?1000:2000);
}
function afterAnswer(){
  if(state.idx>=11){finishTest();return;}
  state.idx++;renderQuestion();
}

/* ============================================================ キーボード ============================================================ */
const KB_ROWS=[["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅛ","ㅕ","ㅑ","ㅐ","ㅔ"],["ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅗ","ㅓ","ㅏ","ㅣ"],["ㅋ","ㅌ","ㅊ","ㅍ","ㅠ","ㅜ","ㅡ"]];
/* Shiftなしで直接入力できる専用行：濃音 → 合成母音(旧Shift) → その他の合成母音 */
const KB_EXTRA_ROWS=[
  ["ㄲ","ㄸ","ㅃ","ㅆ","ㅉ","ㅒ","ㅖ"],       // 濃音 + 合成母音（旧Shift）を1行に
  ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"]        // その他の合成母音
];
/* Shiftキー併用も可（濃音）。専用キーがあるのでShiftは無くても全字入力できる */
const SHIFT_MAP={"ㅂ":"ㅃ","ㅈ":"ㅉ","ㄷ":"ㄸ","ㄱ":"ㄲ","ㅅ":"ㅆ"};
let shiftOn=false;
function keyboardHTML(){
  let h='<div class="korean-keyboard" id="kbd">';
  KB_ROWS.forEach((row,ri)=>{
    h+='<div class="krow">';
    if(ri===2)h+=`<button class="key fn wide" id="shiftkey" onclick="toggleShift()">⇧</button>`;
    row.forEach(k=>h+=`<button class="key" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    if(ri===2)h+=`<button class="key fn wide" onclick="kbBack()">⌫</button>`;
    h+='</div>';
  });
  KB_EXTRA_ROWS.forEach(row=>{
    h+='<div class="krow extra">';
    row.forEach(k=>h+=`<button class="key ex" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    h+='</div>';
  });
  h+=`<div class="krow ctrl">
    <button class="key fn" onclick="kbClear()">Clear</button>
    <button class="key fn wide" onclick="kbSpace()">Space</button>
    <button class="key send" onclick="kbSend()">回答する</button>
    <button class="key dontknow" onclick="submit('unknown','')">わからない</button>
  </div></div>`;
  return h;
}
function applyShiftUI(){
  document.querySelectorAll('#kbd .key[data-k]').forEach(b=>{
    const base=b.dataset.k;b.textContent=shiftOn&&SHIFT_MAP[base]?SHIFT_MAP[base]:base;
  });
  const sk=document.getElementById("shiftkey");if(sk)sk.classList.toggle("shifton",shiftOn);
}
function toggleShift(){shiftOn=!shiftOn;applyShiftUI();}
function kbKey(base){const j=shiftOn&&SHIFT_MAP[base]?SHIFT_MAP[base]:base;IME.input(j);if(shiftOn){shiftOn=false;applyShiftUI();}refreshInput();}
function kbBack(){IME.backspace();refreshInput();}
function kbSpace(){IME.space();refreshInput();}
function kbClear(){IME.reset();refreshInput();}
function kbSend(){const q=state.questions[state.idx];const ans=IME.text().trim();submit(ans===q.correct?"correct":"incorrect",ans);}
function refreshInput(){const el=document.getElementById("winput");if(!el)return;const t=IME.text();el.innerHTML=esc(t)+'<span class="wcaret"></span>';}

/* ============================================================ 結果画面 ============================================================ */
function finishTest(){
  const R=state.results,total=R.reduce((a,r)=>a+r.score,0),rank=rankFor(total);
  const nCorrect=R.filter(r=>r.isCorrect).length,nWrong=12-nCorrect;
  let perfect=getPerfectCount();if(total===100)perfect=incPerfectCount();
  const rows=R.map(r=>{
    const m={correct:["正解","r-ok"],incorrect:["不正解","r-ng"],unknown:["わからない","r-un"],timeout:["時間切れ","r-to"]}[r.answerStatus];
    return `<tr><td class="no">${r.questionNumber}</td><td class="ko">${esc(r.korean)}</td><td>${esc(r.japanese)}</td><td class="${m[1]}">${m[0]}</td></tr>`;
  }).join("");
  document.getElementById("s-result").innerHTML=`
   <div class="res">
    <div class="res-head">
      <div class="res-label">RESULT</div>
      <div class="res-rank rank-${rank}">${rank}</div>
      <div class="res-score">${total} / 100</div>
      <div class="res-stats"><span>正解 <b>${nCorrect}</b></span><span>不正解 <b>${nWrong}</b></span><span>満点達成 <b>${perfect}</b></span></div>
    </div>
    <div class="res-listwrap">
      <table class="rtab"><thead><tr><th class="no">No.</th><th>韓国語</th><th>日本語</th><th>結果</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="res-btns">
      <button class="btn primary full" onclick="startTest()">もう一度挑戦する</button>
      <button class="btn ghost" onclick="renderHistory()">学習履歴を見る</button>
      <button class="btn ghost" onclick="renderCurve()">忘却曲線を見る</button>
      <button class="btn line full" onclick="show('s-home')">ホームに戻る</button>
    </div>
   </div>`;
  show("s-result");
}

/* ============================================================ 学習履歴 ============================================================ */
function aggregateByWord(){
  const h=loadHistory(),map={};
  h.forEach(r=>{
    if(!map[r.wordId])map[r.wordId]={wordId:r.wordId,ko:r.korean,ja:r.japanese,count:0,correct:0,last:null,recs:[]};
    const m=map[r.wordId];m.count++;if(r.isCorrect)m.correct++;m.recs.push(r);
    if(!m.last||r.answeredAt>m.last.answeredAt)m.last=r;
  });
  return Object.values(map).sort((a,b)=>(b.last?.answeredAt||"").localeCompare(a.last?.answeredAt||""));
}
const STATUS_JA={correct:"正解",incorrect:"不正解",unknown:"わからない",timeout:"時間切れ"};
function fmtDate(iso){const d=new Date(iso);const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function rateClass(r){return r<0.5?"rate-bad":r<0.8?"rate-mid":"rate-good";}

function renderHistory(){
  const list=aggregateByWord();
  let body;
  if(list.length===0){
    body=`<div class="empty">まだ学習履歴がありません。<br>テストを行うと，単語ごとの記録が表示されます。</div>`;
  }else{
    const rows=list.map(m=>{
      const rate=m.count?m.correct/m.count:0;
      return `<tr class="click" onclick="renderWordDetail(${m.wordId})">
        <td class="ko" style="font-weight:700">${esc(m.ko)}</td>
        <td style="color:var(--mute)">${esc(m.ja)}</td>
        <td class="num">${m.count}</td>
        <td class="num ${rateClass(rate)}">${Math.round(rate*100)}%</td>
        <td>${STATUS_JA[m.last.answerStatus]}</td></tr>`;
    }).join("");
    body=`<table class="htab"><thead><tr><th>韓国語</th><th>日本語</th><th class="num">出題</th><th class="num">正答率</th><th>最終</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  document.getElementById("s-history").innerHTML=`
   <div class="page">
    <div class="page-head"><button class="back" onclick="show('s-home')">‹</button><h2>学習履歴</h2></div>
    <div class="page-body">${body}</div>
   </div>`;
  show("s-history");
}

function renderWordDetail(wordId){
  const w=WORD_BY_ID[wordId];
  const recs=loadHistory().filter(r=>r.wordId===wordId).sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
  const dirJa={jp_to_kr:"日→韓",kr_to_jp:"韓→日"};
  const rows=recs.map(r=>{
    const dir=r.answerType==="writing"?"書き取り":dirJa[r.direction];
    return `<tr><td>${fmtDate(r.answeredAt)}</td><td>${dir}</td><td>${STATUS_JA[r.answerStatus]}</td><td class="num">${(r.responseTimeMs/1000).toFixed(1)}秒</td><td class="num">${r.score}点</td></tr>`;
  }).join("");
  const note=w.n?`<div class="note">⚠️ ${esc(w.n)}</div>`:"";
  document.getElementById("s-wdetail").innerHTML=`
   <div class="page">
    <div class="page-head"><button class="back" onclick="renderHistory()">‹</button><h2>単語詳細</h2></div>
    <div class="wdetail-head"><div class="ko">${esc(w.ko)}</div><div class="ja">${esc(w.ja)}</div></div>
    ${note}
    <div class="page-body">
      <table class="htab"><thead><tr><th>日時</th><th>方向</th><th>結果</th><th class="num">時間</th><th class="num">得点</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="color:var(--mute);text-align:center;padding:20px">履歴なし</td></tr>'}</tbody></table>
    </div>
   </div>`;
  show("s-wdetail");
}

/* ============================================================ 忘却曲線 ============================================================ */
const BUCKETS=[
  {label:"0〜1日",max:1},{label:"1〜3日",max:3},{label:"3〜7日",max:7},
  {label:"7〜14日",max:14},{label:"14〜30日",max:30},{label:"30日〜",max:Infinity}
];
function bucketIndex(days){for(let i=0;i<BUCKETS.length;i++)if(days<BUCKETS[i].max)return i;return BUCKETS.length-1;}
function computeCurve(){
  const h=loadHistory();
  const byWord={};
  h.forEach(r=>{(byWord[r.wordId]=byWord[r.wordId]||[]).push(r);});
  const buckets=BUCKETS.map(()=>({total:0,correct:0}));
  let analyzedWords=0,pairs=0;
  Object.values(byWord).forEach(recs=>{
    recs.sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
    if(recs.length>=2)analyzedWords++;
    for(let i=1;i<recs.length;i++){
      const days=(new Date(recs[i].answeredAt)-new Date(recs[i-1].answeredAt))/86400000;
      const bi=bucketIndex(days);buckets[bi].total++;if(recs[i].isCorrect)buckets[bi].correct++;pairs++;
    }
  });
  return {buckets,analyzedWords,pairs,totalAnswers:h.length};
}
function renderCurve(){
  const c=computeCurve();
  let body;
  if(c.pairs===0){
    body=`<div class="empty">分析に必要な学習履歴がまだ十分にありません。<br>テストを繰り返すと，忘却曲線が表示されます。</div>`;
  }else{
    const pts=c.buckets.map((b,i)=>({i,label:BUCKETS[i].label,rate:b.total?b.correct/b.total*100:null,total:b.total}));
    const valid=pts.filter(p=>p.rate!==null);
    // 推奨復習：正答率70%を初めて下回るバケット
    const drop=valid.find(p=>p.rate<70);
    const recommend=drop?drop.label:"現状維持で問題ありません";
    const worst=valid.reduce((a,p)=>a===null||p.rate<a.rate?p:a,null);
    body=`
      <div class="chartbox">${lineChart(pts)}</div>
      <div class="curve-stats">
        <div class="cstat"><div class="k">総回答数</div><div class="v">${c.totalAnswers}</div></div>
        <div class="cstat"><div class="k">分析対象単語数</div><div class="v">${c.analyzedWords}</div></div>
        <div class="cstat"><div class="k">最も落ちやすい期間</div><div class="v">${worst?worst.label:"—"}</div></div>
        <div class="cstat"><div class="k">推奨復習タイミング</div><div class="v">${recommend}</div></div>
      </div>
      <div style="color:var(--faint);font-size:11px;line-height:1.7">※ 横軸＝前回学習からの経過日数，縦軸＝正答率。正答率が70%を下回る直前を復習目安としています。</div>`;
  }
  document.getElementById("s-curve").innerHTML=`
   <div class="page">
    <div class="page-head"><button class="back" onclick="show('s-home')">‹</button><h2>忘却曲線</h2></div>
    <div class="page-body">${body}</div>
   </div>`;
  show("s-curve");
}
function lineChart(pts){
  const W=300,H=170,padL=34,padB=26,padT=10,padR=10;
  const innerW=W-padL-padR,innerH=H-padT-padB;
  const x=i=>padL+innerW*(i/(pts.length-1));
  const y=r=>padT+innerH*(1-r/100);
  let grid="",lbl="";
  [0,25,50,75,100].forEach(v=>{const yy=y(v);grid+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#26282d" stroke-width="1"/><text x="${padL-5}" y="${yy+3}" fill="#5c616b" font-size="8" text-anchor="end">${v}</text>`;});
  pts.forEach((p,i)=>{lbl+=`<text x="${x(i)}" y="${H-padB+13}" fill="#8b909a" font-size="7.5" text-anchor="middle">${p.label}</text>`;});
  const valid=pts.filter(p=>p.rate!==null);
  const poly=valid.map(p=>`${x(p.i)},${y(p.rate)}`).join(" ");
  let dots="";valid.forEach(p=>{dots+=`<circle cx="${x(p.i)}" cy="${y(p.rate)}" r="3.2" fill="#4cd964"/><text x="${x(p.i)}" y="${y(p.rate)-7}" fill="#f2f3f5" font-size="8" text-anchor="middle">${Math.round(p.rate)}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${grid}<polyline points="${poly}" fill="none" stroke="#4cd964" stroke-width="2"/>${dots}${lbl}</svg>`;
}

/* ============================================================ utils ============================================================ */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
getUserId();
