<style>
/* LINE Seed JP（公式配布woff2を同梱） */
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Rg.woff2") format("woff2");font-weight:400;font-display:swap}
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Bd.woff2") format("woff2");font-weight:700;font-display:swap}
@font-face{font-family:"LINESeedJP";src:url("fonts/LINESeedJP-Eb.woff2") format("woff2");font-weight:800;font-display:swap}
/* 韓国語は LINE Seed KR（JPにハングルが無いためフォールバックで適用） */
@font-face{font-family:"LINESeedKR";src:url("fonts/LINESeedKR-Rg.woff2") format("woff2");font-weight:400;font-display:swap}
@font-face{font-family:"LINESeedKR";src:url("fonts/LINESeedKR-Bd.woff2") format("woff2");font-weight:700 800;font-display:swap}
:root{
  --bg:#000; --panel:#16181c; --panel2:#1f2125; --gray:#26282d; --gray-h:#33363c;
  --line:#2a2d33; --text:#f2f3f5; --mute:#FFFFFF; --faint:rgba(255,255,255,.78);
  --red:#ff3b3b; --blue:#2f8bff; --green:#4cd964; --gold:#ffc83c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
  font-family:"LINESeedJP","LINESeedKR","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo","Noto Sans CJK JP","Noto Sans KR",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{display:flex;justify-content:center}
.app{width:100%;max-width:602px;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)} /* ノッチ/ホームバー回避 */

button{font-family:inherit}
.hidden{display:none!important}

/* ===== screens ===== */
.screen{flex:1;display:none;flex-direction:column;min-height:0}
.screen.on{display:flex}

/* ===== top bar (quiz) ===== */
/* 問題番号・残り時間は白文字 */
.qbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;font-size:13px;color:#FFFFFF;font-weight:700;gap:12px}
.qhome{background:rgba(0,0,0,.8);border:none;color:#fff;width:32px;height:32px;font-size:16px;cursor:pointer;flex:0 0 auto}
.qbar .prog{margin-right:auto;letter-spacing:.5px}
.qbar .time{color:#FFFFFF;font-variant-numeric:tabular-nums}
.tbar{height:3px;margin:8px 18px 0;background:rgba(0,0,0,.35);border-radius:3px;overflow:hidden}
.tfill{height:100%;width:100%;background:#00FF37;transition:width .1s linear} /* 制限時間バーは緑（ホームのトンマナ） */
.tfill.warn{background:#FFC400}

/* ===== question ===== */
.qstage{flex:1;display:flex;flex-direction:column;min-height:0}
.qmain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8vh 20px 0;text-align:center}
.qword{font-size:clamp(34px,9vw,46px);font-weight:800;line-height:1.25;word-break:break-all}
.qword.ja{font-weight:600}
/* 単語と選択肢の間に表示する関連画像 */
.qimg{margin-top:3vh;display:flex;justify-content:center;width:100%}
.qimg img{width:min(80%,360px);max-height:24vh;object-fit:cover;border:1px solid var(--line);display:block;background:var(--panel)}
.qbottom{padding:0 18px calc(18px + env(safe-area-inset-bottom))}

/* choices */
.choices{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.choice{position:relative;background:rgba(0,0,0,.8);border:none;border-radius:0;padding:18px;font-size:21px;font-weight:700;color:#fff;
  text-align:center;cursor:pointer;transition:background .12s,transform .08s;min-height:60px}
.chspk{position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:.8;pointer-events:none;display:flex}
.cdown{display:flex;align-items:center;justify-content:center;height:60vh}
.cnum{font-size:170px;font-weight:900;color:#fff;line-height:1;animation:cpop .4s ease}
@keyframes cpop{from{transform:scale(1.8);opacity:.15}to{transform:scale(1);opacity:1}}
.choice:active{transform:scale(.98);background:rgba(0,0,0,.65)}
/* 回答後のハイライト：正解=赤 / 選んだ誤答=青 / その他=暗い灰色のまま。色は20%薄く(不透明度.8)、視認性は維持 */
.choice.correct{background:rgba(255,59,59,.8);color:#fff}
.choice.wrong{background:rgba(47,139,255,.8);color:#fff}

/* unknown btn */
.unknown{display:block;margin:0 auto;background:rgba(0,0,0,.8);border:none;color:#fff;
  font-size:13px;font-weight:600;padding:9px 22px;border-radius:0;cursor:pointer}
.unknown:active{background:rgba(0,0,0,.65)}

/* ===== overlay symbol ===== */
/* 横:中央 / 縦:中央から画面高の20%上へ / 大きさ1.3倍(46→60vw) / 線2倍(font-weight倍+text-stroke) / 透明度.6維持 */
/* 四択は選択肢の色を見せたいので背景は透明。書き取りは比較テキストを読ませるため暗幕を付ける */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:auto;background:transparent}
.overlay.backdrop{background:rgba(0,0,0,.72)}
.tap-next{position:absolute;left:0;right:0;bottom:7%;text-align:center;font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);animation:bob 1.4s ease-in-out infinite}
/* 大きさ-10%(60→54vw) / 線+20%(1.4→1.68, 1.2→1.44vw) / 縦は5%下へ(-20→-15vh) / 横中央・透明度.6維持 */
.ovsym{font-size:54vw;line-height:1;font-weight:600;opacity:.6;transform:translateY(-15vh)}
.ovsym.o{color:var(--red);-webkit-text-stroke:1.68vw var(--red);text-stroke:1.68vw var(--red)}
.ovsym.x{color:var(--blue);font-weight:400;-webkit-text-stroke:1.44vw var(--blue);text-stroke:1.44vw var(--blue)}
/* 書き取りの正誤比較：入力=青文字 / 正解=赤文字。問題と選択肢の間（画面中央）に配置 */
.ovans{position:absolute;left:0;right:0;top:30%;transform:translateY(-50%);text-align:center;padding:0 18px;pointer-events:none}
.ovans .oa-row{margin:8px 0}
.ovans .oa-lab{color:var(--mute);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.ovans .oa-ko{font-size:clamp(38px,10vw,54px);font-weight:800;line-height:1.25;word-break:break-all}
.ovans .oa-ko.correct{color:var(--red)}
.ovans .oa-ko.wrong{color:var(--blue)}

/* ===== writing ===== */
.winput{margin:0 18px;min-height:58px;background:var(--panel);border:1px solid var(--line);border-radius:0;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;letter-spacing:1px;padding:10px}
.wcaret{display:inline-block;width:2px;height:30px;background:var(--text);margin-left:2px;animation:blink 1s steps(1) infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
/* 成績連動ヒント（先頭1音節）。ボタンではなく自動表示 */
.whint{color:#FFFFFF;font-size:15px;font-weight:700;margin-top:12px}
.whint b{font-size:22px;margin-left:3px}
/* 韓国語キーボードは画面下部に固定。PCでは中央寄せ＋最大幅でアプリ幅に揃える */
.korean-keyboard{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:602px;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line);z-index:50}
.krow{display:flex;gap:5px;justify-content:center;margin-bottom:6px}
.key{flex:1;min-width:0;background:var(--gray);border:none;border-radius:0;color:var(--text);font-size:22px;font-weight:600;
  padding:13px 0;cursor:pointer;min-height:46px}
.key:active{background:var(--gray-h)}
.key.wide{flex:1.5}
.key.fn{background:var(--panel2);color:var(--mute);font-size:13px;font-weight:700}
.key.shifton{background:var(--gray-h);color:var(--text);border:1px solid var(--line)}
/* 操作行：わからない(左) / 回答する(中央・大・緑) / ⌫(右) */
.krow.ctrl .key{font-size:13px;font-weight:700;padding:13px 0}
.key.send{flex:2;background:var(--green);color:#06280f;border:none;font-size:16px;font-weight:800}
.key.send:active{background:#3fbf55}
.key.dontknow{background:var(--gray);border:1px solid var(--line);color:var(--text)}
/* 濃音・合成母音の専用行（下2行）：中央寄せ・縦幅は通常キーの75% */
.krow.extra{justify-content:center}
.krow.extra .key.ex{flex:0 1 48px;max-width:56px;background:var(--panel2);color:var(--text);padding:6px 0;min-height:34px}

/* ===== home ===== */
.home{padding:0 22px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.home h1{font-size:30px;font-weight:800;margin:0;text-align:center}
.home .sub{color:var(--mute);font-size:14px;text-align:center;line-height:1.7;margin:-4px 0 18px}
.home .ver{color:var(--faint);font-size:11px;font-weight:700;text-align:center;letter-spacing:1px;margin-top:14px}

/* ===== タイプ診断（V2.1: コード＋キャラクターのみの引き算デザイン） ===== */
/* ===== ホーム（602×1178基準・サーモンピンク背景・絶対配置） ===== */
#s-home{background:#E3A38D;flex-direction:row;justify-content:center;align-items:flex-start;overflow:hidden;transition:background-color .5s ease}
.home-wrap{position:relative;flex:0 0 auto;width:602px;height:1178px;background:#E3A38D;
  transform-origin:top center;color:#FFFFFF;font-weight:800; /* 見本はExtraBold相当 */
  transition:background-color .5s ease;
  font-family:"LINESeedJP","LINESeedKR","Hiragino Kaku Gothic ProN",sans-serif}
/* バー：暗いトラック＋内側に角丸フィル（見本準拠） */
.home-wrap .gauge,.dash-head .gauge{position:absolute;background:#333333;border-radius:999px;padding:3px;box-sizing:border-box;z-index:2}
.home-wrap .gfill,.dash-head .gfill{height:100%;border-radius:999px;transition:width .5s ease;width:0}
/* ヘッダー（さらに上へ。茶色領域は黒80%透過。4色ドットは廃止） */
.avatar-circle{position:absolute;left:40px;top:44px;width:114px;height:114px;border-radius:50%;background:#fff;border:5px solid rgba(0,0,0,.8);box-sizing:border-box;overflow:hidden;cursor:pointer;z-index:2} /* 背景=タイプ/PWRページと同じグレー */
.avatar-image{width:100%;height:100%;object-fit:contain;padding:12px;box-sizing:border-box}
.hv-level{position:absolute;left:176px;top:44px;display:flex;align-items:baseline;gap:3px;line-height:1;z-index:2;font-size:20px}
.hv-level span{font-size:38px}
.hv-code{position:absolute;right:47px;top:41px;font-size:40px;letter-spacing:1px;line-height:1;cursor:pointer;z-index:2;display:flex;align-items:center;gap:5px} /* レベル表記と同じ高さに(1px上) */
.streak-fire{width:50px;height:50px;object-fit:contain;display:block}
#hv-pwrdown{position:absolute;left:166px;top:153px;width:403px;text-align:center;font-size:16px;font-weight:700;color:#fff;z-index:2;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.home-side-btn img{width:74%;height:74%;object-fit:contain;pointer-events:none;display:block;margin:auto}
.status-panel{position:absolute;left:166px;top:83px;width:403px;height:64px;border-radius:32px;background:rgba(0,0,0,.8);z-index:1;cursor:pointer}
.hv-lab,.hv-xpg,.hv-pwrg{pointer-events:none}
.hv-lab{position:absolute;font-size:18px;line-height:19px;z-index:2}
.hv-xplabel{left:175px;top:92px;width:80px;text-align:right}
.hv-xpg{left:263px;top:92px;width:178px;height:19px}
.hv-xpval{left:450px;top:92px}
.hv-pwrlabel{left:175px;top:120px;width:80px;text-align:right}
.hv-pwrg{left:263px;top:120px;width:178px;height:19px}
.hv-pwrval{left:450px;top:120px}
/* ROOM選択：ROOM情報＋ジオラマを丸ごと左右スワイプ（番号やパラメータも一緒にスクロール）。
   コンテナは全幅＝画像は画面の端で見切れる */
/* スライドは全画面高＋ROOM色の背景：スワイプで「色の区切れ目」が指と一緒に移動する */
.room-scroll{transform:translateY(calc(var(--down,0px)*2.2));transition:transform .4s ease;position:absolute;left:0;top:0;width:602px;height:1178px;display:flex;overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:0}
.room-scroll::-webkit-scrollbar{display:none}
.room-slide{position:relative;flex:0 0 602px;width:602px;height:1178px;scroll-snap-align:start}
.slide-inner{position:absolute;left:0;top:255px;width:602px;height:686px}
/* ROOMパラメータ（ラベル/番号・語数/バー/%の間に余白。ランクD,B=36px・A=98pxで下端揃え） */
.rmenu-bg{position:absolute;left:40px;top:-12px;width:522px;height:116px;background:rgba(255,255,255,.15);border-radius:999px;cursor:pointer} /* 縦幅=旧174の2/3 */
.hv-roomlabel{position:absolute;left:83px;top:2px;font-size:21px;letter-spacing:.5px;line-height:1;cursor:pointer}
.hv-roomno{position:absolute;left:72px;top:28px;font-size:72px;line-height:1;cursor:pointer}
.hv-learned{position:absolute;left:244px;top:7px;font-size:27px;line-height:1;color:#FFFFFF}
.hv-roompwr{position:absolute;left:244px;top:51px;font-size:32px;line-height:1;color:#FFFFFF}
.hv-learned .unit{font-size:16px;margin-left:4px}
.hv-roompwr .unit{font-size:19px;margin-left:4px}
.hv-wordsg{left:238px;top:37px;width:89px;height:10px;padding:2px}
.hv-roomg{left:238px;top:88px;width:89px;height:10px;padding:2px}
/* ランクの下端(146)を下段バー(132+14=146)・ROOM番号の字面下端と一致させる */
.rank-s{position:absolute;left:363px;top:78px;width:24px;height:24px;border-radius:50%;background:#555;
  display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;z-index:1}
.rank-s1{left:385px}
.rank-b{position:absolute;left:455px;top:37px;width:65px;height:65px;border-radius:50%;background:#555;
  display:flex;align-items:center;justify-content:center;font-size:53px;line-height:1;z-index:2}
/* ROOM01の左にある難易度切替スライド */
.lv-pick{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;gap:26px;width:380px}
.lvbtn{height:112px;border:none;border-radius:56px;background:rgba(0,0,0,.8);color:#fff;font-size:44px;font-weight:800;cursor:pointer;font-family:inherit}
.lvbtn:active{background:rgba(0,0,0,.65)}
.lvbtn.on{box-shadow:0 0 0 4px #fff inset}
.lv-pick .lv-cap{text-align:center;font-size:22px;color:rgba(255,255,255,.85);letter-spacing:2px}
.slide-img{position:absolute;left:24px;top:120px;width:554px;height:507px;object-fit:contain} /* メニュー縮小(-58px)ぶん上へ */
/* 今日学ぶべき単語の帯：スタートボタン上に半透明白、カードが左→右に流れる */
.today-band{position:absolute;left:0;top:888px;width:602px;height:104px;background:rgba(255,255,255,.35);z-index:1;overflow:hidden;display:flex;align-items:center;pointer-events:none;opacity:1;transition:opacity .3s ease}
.home-wrap.status .today-band,.home-wrap.hiderail .today-band{opacity:0}
.tb-track{display:flex;gap:12px;padding-left:12px;animation:tbflow 30s linear infinite;will-change:transform}
@keyframes tbflow{from{transform:translateX(0)}to{transform:translateX(-50%)}} /* 右→左 */
.tb-card{flex:0 0 auto;background:rgba(255,255,255,.92);border-radius:14px;padding:10px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:110px}
.tb-ko{font-size:26px;font-weight:900;color:#222;line-height:1.15}
.tb-ja{font-size:14px;font-weight:700;color:#666;margin-top:2px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 単語一覧モード：スワイプ連動（--lift/--pはhome-wrapに設定） */
.home-wrap .slide-inner{transform:translateY(var(--lift,0px));transition:transform .35s ease}
#calendar-modal{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55)}
#calendar-modal.on{display:flex}
.cal-card{width:340px;max-width:88vw;background:#fff;color:#1a1a1a;padding:20px;position:relative}
.cal-h{font-size:19px;font-weight:900;text-align:center;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid .cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;position:relative}
.cal-grid .wd{font-size:11px;font-weight:800;color:#888;aspect-ratio:auto;padding:2px 0}
.cal-grid .today{background:#FFE9B0;border-radius:6px}
.cal-grid .launched::after{content:"◎";position:absolute;font-size:26px;color:rgba(224,131,26,.7);font-weight:400}
.cal-grid .sp{color:#E0433b}
.cal-sp{margin-top:14px;text-align:center;font-size:14px;font-weight:800}
.cal-sp .rbtext{font-weight:900}
.cal-close{position:absolute;right:10px;top:6px;background:transparent;border:none;font-size:24px;font-weight:900;color:#888;cursor:pointer}
.reward-rail{position:absolute;right:14px;top:430px;display:flex;flex-direction:column;gap:8px;z-index:5;
  opacity:1;transition:opacity .3s ease} /* ピルの下・画面右に縦4 */
.home-wrap.status .reward-rail,.home-wrap.hiderail .reward-rail,.home-wrap.status .home-side-btn,.home-wrap.hiderail .home-side-btn,.home-wrap.status .start-button,.home-wrap.hiderail .start-button{opacity:0;pointer-events:none}
.home-side-btn{opacity:1;transition:transform .4s ease,opacity .3s ease}
.rr-btn{width:68px;height:68px;border:none;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;position:relative}
.rr-btn img{width:86%;height:86%;object-fit:contain}
.rr-set{font-size:34px;color:#fff;line-height:1}

.htab th,.htab td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
.htab th{position:sticky;top:0;background:rgba(0,0,0,.8);color:#fff;font-size:12px;font-weight:800;white-space:nowrap}
.htab td.ko{font-size:18px}
.htab td:nth-child(2){font-size:16px;font-weight:700}
.htab td.num{text-align:right;font-variant-numeric:tabular-nums}
.htab tr.click{cursor:pointer}
.htab tr.click:active{background:var(--panel)}
.rate-bad{color:var(--blue)}.rate-mid{color:var(--gold)}.rate-good{color:var(--green)}
.empty{color:var(--mute);text-align:center;padding:40px 20px;line-height:1.9;font-size:14px}
.note{background:#1a1407;border:1px solid #3a2e0a;border-radius:0;padding:11px 13px;font-size:12.5px;color:#e8c878;line-height:1.6;margin:10px 0}
.curve-stats{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.cstat{flex:1 1 44%;background:rgba(0,0,0,.8);border:none;border-radius:0;padding:12px}
.cstat .k{color:var(--mute);font-size:11px;font-weight:700}
.cstat .v{font-size:17px;font-weight:800;margin-top:3px}
.chartbox{background:rgba(0,0,0,.8);border:1px solid var(--line);border-radius:0;padding:14px 10px 8px}
.chartbox polyline.grow{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.1s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
/* 記憶コンディション・タブ */
.cond{flex:0 0 auto;text-align:center;padding:4px 0 8px}
.cond-k{color:var(--mute);font-size:11px;font-weight:800;letter-spacing:2px}
.cond-v{font-size:40px;font-weight:900;line-height:1.1}
.cond-v span{font-size:16px;color:var(--mute);font-weight:800}
.cond-sub{color:var(--mute);font-size:12px;font-weight:700;margin-top:2px}
.mpanel{background:rgba(0,0,0,.8);padding:10px 14px 12px;margin-bottom:12px}
.mpanel .cs-head{margin-bottom:6px}
.curve-words{background:rgba(0,0,0,.35)}
.curve-words .wl-ko{font-size:30px}
.curve-words .wl-ja{font-size:19px}
.curve-words .wl-no{flex:0 0 36px;font-size:12px}
.curve-words .wl-rate{flex:0 0 40px;font-size:14px}
.curve-words .wl-row{padding:8px 10px}
.curve-scroll{flex:1;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none}
.curve-scroll::-webkit-scrollbar{display:none}
.curve-slide{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;padding:0 16px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch}
.cs-head{font-size:20px;font-weight:900;letter-spacing:2px;margin:2px 0 8px}
.pwrline{display:flex;align-items:center;justify-content:center;gap:12px}
.pwr-lab,.pwr-val{font-size:22px;font-weight:900;line-height:1}
.pwr-g{width:210px;height:19px;background:#333;border-radius:999px;padding:3px;box-sizing:border-box}
.pwr-g div{height:100%;border-radius:999px}
.cond-sub b{color:var(--green)}
.tabs{flex:0 0 auto;display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;background:var(--gray);border:1px solid var(--line);color:var(--mute);font-size:12px;font-weight:700;padding:8px 11px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--text);color:#000;border-color:var(--text)}
.ms-stable{color:var(--green)}.ms-review{color:var(--gold)}.ms-urgent{color:#ff6b6b}
.catbar{height:6px;background:var(--gray);width:90px;max-width:30vw}
.catbar-f{height:100%}
.catbar-f.ms-stable{background:var(--green)}.catbar-f.ms-review{background:var(--gold)}.catbar-f.ms-urgent{background:#ff6b6b}
.bignote{background:var(--panel);border:1px solid var(--line);padding:14px;text-align:center;font-size:14px;line-height:1.8;font-weight:700;margin-bottom:12px}
.bignote b{color:var(--green);font-size:18px}
.bignote .improve{color:var(--green);font-weight:800}
#s-wdetail .htab th,#s-wdetail .htab td{padding:6px 4px}
#s-wdetail .htab td:first-child{font-size:11px;color:var(--faint)}
.dicon{width:20px;height:20px;vertical-align:-4px;margin-right:2px}
.wd-scroll{flex:1;min-height:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none}
.wd-scroll::-webkit-scrollbar{display:none}
.wd-slide{flex:0 0 100%;width:100%;scroll-snap-align:start;overflow-y:auto;padding:4px 16px 24px;box-sizing:border-box;-webkit-overflow-scrolling:touch}
.wd-top{display:flex;justify-content:center;align-items:baseline;gap:22px;font-size:19px;font-weight:900;margin:2px 0 4px}
.wd-img{display:block;width:min(62vw,300px);height:auto;margin:6px auto 2px}
.wd-ko2{text-align:center;font-size:40px;font-weight:800;line-height:1.15;margin-top:4px}
.wd-ja2{text-align:center;font-size:20px;font-weight:800;color:rgba(255,255,255,.92);margin-top:2px}
.wdetail-head{margin-bottom:6px}
.wd-line{display:flex;justify-content:space-between;align-items:baseline;gap:12px} /* 韓国語=左端 / 日本語=右端 */
.wd-line .ja{text-align:right}
.wdetail-head .ko{font-size:26px;font-weight:800}
.wdetail-head .ja{color:#FFFFFF;font-size:26px;font-weight:800;margin-top:2px}

/* n番目の曜日(weekday:0=日)の日付。可変祝日用 */
function nthWeekday(y,m,wd,n){let d=new Date(y,m,1),c=0;while(d.getMonth()===m){if(d.getDay()===wd){c++;if(c===n)return new Date(d);}d.setDate(d.getDate()+1);}return null;}
/* その日にかかわる特別ボーナス（無ければnull） */
function specialBonusFor(dt){
  const y=dt.getFullYear(),m=dt.getMonth(),day=dt.getDate();
  const eq=d=>d&&d.getMonth()===m&&d.getDate()===day;
  if(m===0&&day===1)return{name:"元日",amount:300};
  if(m===1&&day===14)return{name:"バレンタイン",amount:150};
  if(m===2&&day===3)return{name:"ひな祭り",amount:150};
  if(eq(nthWeekday(y,4,0,2)))return{name:"母の日",amount:200};
  if(m===4&&day===5)return{name:"こどもの日",amount:150};
  if(eq(nthWeekday(y,5,0,3)))return{name:"父の日",amount:200};
  if(eq(nthWeekday(y,6,1,3)))return{name:"海の日",amount:200};
  if(m===6&&day===7)return{name:"七夕",amount:150};
  if(m===9&&day===31)return{name:"ハロウィン",amount:200};
  if(m===11&&(day===24||day===25))return{name:"クリスマス",amount:300};
  if(m===11&&day===31)return{name:"大晦日",amount:200};
  return null;
}

/* PWR=学習済み（1回以上出題）全単語の平均記憶率。時間で低下し復習で上昇 */
function pwrOverallExact(){const s=loadStats(),ids=Object.keys(s);if(!ids.length)return 0;const now=Date.now();let t=0;ids.forEach(id=>t+=displayMemoryScore(getStat(id,s),now));return t/ids.length;}
function pwrOverallAt(ms){const s=loadStats(),ids=Object.keys(s);if(!ids.length)return 0;let t=0;ids.forEach(id=>t+=displayMemoryScore(getStat(id,s),ms));return t/ids.length;}
/* PWR表示は「1回だけ実測→固定速度で直線減算」の決め打ち方式（毎0.3秒の全単語再計算をやめ計算コスト削減） */
let _pwrT0=0,_pwrBase=0,_pwrRate=0;
function calibratePwr(){
  _pwrBase=pwrOverallExact();
  _pwrRate=Math.max(0,(_pwrBase-pwrOverallAt(Date.now()+3600000))/3600); // %/秒（1時間先との差から一定速度を決める）
  _pwrT0=Date.now();
}
function updatePwrFine(){
  const num=document.getElementById("hv-pwrval");if(!num)return;
  if(!_pwrT0)calibratePwr();
  const v=Math.max(0,_pwrBase-_pwrRate*(Date.now()-_pwrT0)/1000);
  num.textContent=v.toFixed(3)+"%";                 // 元のメーターを12.123のように3桁小数で（みるみる減るのが見える）
  const f=document.getElementById("hv-pwrfill");if(f)f.style.width=v+"%";
  const dn=document.getElementById("hv-pwrdown");
  if(dn){
    if(_pwrRate>0){
      const cycle=0.001/_pwrRate, into=((Date.now()-_pwrT0)/1000)%cycle;
      dn.textContent=`PWRが0.001%減るまで あと${Math.max(1,Math.ceil(cycle-into))}秒`; // 整数秒で毎秒カウントダウン
    }else dn.textContent="PWRは安定しています";
  }
}
setInterval(()=>{const h=document.getElementById("s-home");if(h&&h.classList.contains("on"))updatePwrFine();},300);
function pwrOverall(){
  const s=loadStats(),ids=Object.keys(s);
  if(!ids.length)return 0;

/* ROOM選択：番号・パラメータ・ジオラマを1スライドにまとめ、丸ごと左右スワイプ */
let _roomScrollT=null,_listMode=false;
/* 単語一覧モード：ROOMメニューが上へスライドし、下に単語一覧。横スワイプで隣のROOMの一覧へ */
const LIFT_MAX=210; // ROOMメニューが最上部に達するまでの移動量
function setLift(px){ // ピル上昇量(px)とヘッダー/写真用の進捗(--p)を同時に設定
  const w=document.getElementById("homewrap");if(!w)return;
  w.style.setProperty("--lift",px+"px");

function enterListMode(){
  if(_listMode)return;

    _listMode=true;buildRoomSlides();

    ls.forEach(e=>e.style.opacity="0");

    ls.forEach(e=>e.style.opacity="");

function exitListMode(){
  document.getElementById("homewrap").classList.remove("hiderail");

/* 一覧モード: ROOMメニュー下・単語表上の帯（左40%=PWRメータボタン / 右60%=テスト履歴3件） */
function roomMidHTML(n){
  const ids=new Set(LEVEL_SECTIONS[curLevel][n]||[]),byTest={};
  loadHistory().forEach(r=>{if(r.testId&&ids.has(r.wordId))(byTest[r.testId]=byTest[r.testId]||[]).push(r);});
  const tests=Object.entries(byTest).map(([tid,a])=>({tid,at:a[a.length-1].answeredAt,total:a.reduce((x,r)=>x+(r.score||0),0),n:a.length,ok:a.filter(r=>r.isCorrect).length}))
    .sort((a,b)=>b.at.localeCompare(a.at)).slice(0,3);
  const rows=tests.length?tests.map(t=>{
    const full=t.n>=12,tt=Math.ceil(t.total),rk=full?rankFor(tt):null;
    return `<div class="wh-row" onclick="renderPastResult('${t.tid}')">
      <span class="wh-date">${fmtDate(t.at)}</span>
      <span class="wh-rank" style="background:${rk?(RANK_COLORS[rk]||"#555"):"rgba(0,0,0,.22)"}">${rk||"-"}</span>
      <span class="wh-score">${tt}</span>
      <span style="color:#FF3B3B">○${t.ok}</span><span style="color:#2F6FE0">×${t.n-t.ok}</span></div>`;
  }).join(""):'<div class="wh-empty">まだテスト履歴がありません</div>';
  return `<div class="wl-mid">
    <div class="wl-hist">${rows}</div>
  </div>`;
}

/* スライド内の単語帳（獲得カード=カラー、未獲得=シルエット） */
function roomListHTML(n){
  const ids=LEVEL_SECTIONS[curLevel][n]||[],st=loadStats(),cards=loadCards(),now=Date.now();
  let owned=0,totalCnt=0;
  const cells=ids.map((id,i)=>{
    const w=WORD_BY_ID[id],x=st[id],cnt=cards[id]||0,no=String(i+1).padStart(3,"0");
    const seen=x&&x.reviewCount>0;

      owned++;totalCnt+=cnt;
      const rate=Math.round(displayScore(getStat(id,st),now)),ms=memState(rate);
      const img=(typeof WORD_IMG!=="undefined"&&WORD_IMG[w.ko])?`<img class="zk-img" src="${WORD_IMG[w.ko]}" loading="lazy" alt="">`:"";
      return `<div class="zk-card" onclick="renderWordDetail(${id},'room')">
        <span class="zk-no">${no}</span><span class="zk-cnt">×${cnt}</span><span class="zk-rate-side ${ms.cls}">${rate}%</span>
        <div class="zk-ko">${esc(w.ko)}</div>${img}<div class="zk-ja">${esc(w.ja)}</div></div>`;
    }

function roomInfoFor(n){

  const rec=loadSections()[curLevel+"-"+String(n).padStart(2,"0")]||{};

const LEVEL_SLIDE_BG="#9FA6AD";
function switchLevel(l){curLevel=l;curSection=1;buildRoomSlides();applyHomeBg();saveLastRoom();}
function buildRoomSlides(){
  const el=document.getElementById("hv-rooms");if(!el)return;
  const count=LEVEL_INFO[curLevel].count;
  // 先頭(ROOM01の左)に難易度切替スライド
  const levelSlide=`<div class="room-slide level-slide" data-n="0" style="background:${LEVEL_SLIDE_BG}">
    <div class="lv-pick">
      <div class="lv-cap">LEVEL</div>
      <button class="lvbtn ${curLevel==="beginner"?"on":""}" onclick="switchLevel('beginner')">初級</button>
      <button class="lvbtn ${curLevel==="middle"?"on":""}" onclick="switchLevel('middle')">中級</button>
    </div>
  </div>`;
  el.innerHTML=levelSlide+Array.from({length:count},(_,i)=>{
    const n=i+1,nn=String(n).padStart(2,"0"),ri=roomInfoFor(n);
    const circ=(cls,rank)=>rank?`<div class="${cls}" style="background:${RANK_COLORS[rank]||"#555"}">${rank}</div>`:"";
    // 直近=右の大きい丸 / 1つ前=真ん中(小) / 2つ前=左(小)
    const arr=ri.recent;
    const rLast=arr.length>=1?arr[arr.length-1]:null;
    const rPrev1=arr.length>=2?arr[arr.length-2]:null;
    const rPrev2=arr.length>=3?arr[arr.length-3]:null;
    const big=rLast?circ("rank-b",rLast):`<div class="rank-b" style="background:rgba(0,0,0,.22)">-</div>`;
    return `<div class="room-slide" data-n="${n}" style="background:${roomBg(n)}">
      <div class="slide-inner">
      <div class="rmenu-bg" onclick="roomMenuTap(${n})"></div>
      <div class="hv-roomlabel" onclick="roomMenuTap(${n})">ROOM</div>
      <div class="hv-roomno" onclick="roomMenuTap(${n})">${nn}</div>
      <div class="hv-learned">${ri.learned}<span class="unit">語</span></div>
      <div class="gauge hv-wordsg"><div class="gfill" style="background:#00FFFF;width:${Math.round(ri.learned/ri.total*100)}%"></div></div>
      <div class="hv-roompwr">${ri.pwr}<span class="unit">%</span></div>
      <div class="gauge hv-roomg"><div class="gfill" style="background:#00FF37;width:${ri.pwr}%"></div></div>
      ${rPrev2?circ("rank-s",rPrev2):""}
      ${rPrev1?circ("rank-s rank-s1",rPrev1):""}
      ${big}
      ${_listMode?(roomMidHTML(n)+roomListHTML(n)):`<div class="room-ph">${nn}</div>
      <img class="slide-img" src="rooms/${curLevel}-${nn}.webp" alt="" loading="lazy"
        onload="this.previousElementSibling.style.display='none'"
        onerror="this.style.display='none'">`}
      </div>
    </div>`;
  }).join("");
  if(!el.dataset.bound){
    el.dataset.bound="1";
    // 上スワイプ: ROOMメニューがスワイプに連動して上部へ移動し、到達で単語一覧を表示
    let _ty=null,_tx=null,_vdrag=false,_dragDown=false;
    el.addEventListener("touchstart",e=>{_ty=e.touches[0].clientY;_tx=e.touches[0].clientX;_vdrag=false;_dragDown=false;},{passive:true});
    el.addEventListener("touchmove",e=>{
      if(_ty==null||_statusMode)return;
      const dy=e.touches[0].clientY-_ty,dx=e.touches[0].clientX-_tx;
      if(!_vdrag){
        if(!_listMode&&dy>12&&Math.abs(dy)>Math.abs(dx)*1.2){
          _ty=null;enterStatusMode();return; // 下スクロールを少しでもしたら即ステータスへ
        }else if(!_listMode&&dy<-12&&Math.abs(dy)>Math.abs(dx)*1.2){
          _vdrag=true;document.getElementById("homewrap").classList.add("dragging");
        }else if(_listMode&&dy>12&&Math.abs(dy)>Math.abs(dx)*1.2){
          // 一覧モード中の下スワイプ: 単語帳が最上部のときだけ「戻る」。途中ならリストのスクロールを優先
          const sl=el.querySelector(`.room-slide[data-n="${curSection}"] .slide-list`);
          if(sl&&sl.scrollTop<=0){_vdrag=true;_dragDown=true;document.getElementById("homewrap").classList.add("dragging");}
          else return;
        }else return;
      }
      e.preventDefault();
      if(_dragDown)setLift(Math.max(-LIFT_MAX,Math.min(0,-LIFT_MAX+dy)));
      else setLift(Math.max(-LIFT_MAX,Math.min(0,dy)));
    },{passive:false});
    el.addEventListener("touchend",()=>{
      if(_vdrag){
        const w=document.getElementById("homewrap");w.classList.remove("dragging");
        const cur=parseFloat(w.style.getPropertyValue("--lift"))||0;
        if(_dragDown){
          if(cur>=-LIFT_MAX+80){exitListMode();} // 下スワイプで元に戻る（写真はフェードイン）
          else setLift(-LIFT_MAX);
        }else{
          if(cur<=-80)enterListMode();else setLift(0);
        }
      }
      _ty=null;_vdrag=false;_dragDown=false;
    });
    // ステータス中: 上スワイプでホームへ戻る（ROOMメニュー以下は下から再入場）
    const hw=document.getElementById("homewrap");
    if(hw&&!hw.dataset.gbound){
      hw.dataset.gbound="1";
      let sy=null,sx=null;
      hw.addEventListener("touchstart",e=>{sy=e.touches[0].clientY;sx=e.touches[0].clientX;},{passive:true});
      hw.addEventListener("touchmove",e=>{
        if(sy==null||!_statusMode)return;
        const dy=e.touches[0].clientY-sy,dx=e.touches[0].clientX-sx;
        if(dy<-40&&Math.abs(dy)>Math.abs(dx)*1.2){sy=null;exitStatusMode();}
      },{passive:true});
      hw.addEventListener("touchend",()=>{sy=null;});
    }
    el.addEventListener("scroll",()=>{
      // スワイプ中も上下端の色を支配的なスライドへ即時追従（index0=難易度切替スライド）
      const idx=Math.min(Math.max(Math.round(el.scrollLeft/602),0),LEVEL_INFO[curLevel].count);
      applyBgAll(idx===0?LEVEL_SLIDE_BG:roomBg(idx));
      clearTimeout(_roomScrollT);
      _roomScrollT=setTimeout(()=>{
        const n=Math.min(Math.max(Math.round(el.scrollLeft/602),0),LEVEL_INFO[curLevel].count);
        if(n>=1&&n!==curSection){curSection=n;applyHomeBg();saveLastRoom();}
      },120);
    });
  }
  el.scrollLeft=curSection*602; // 先頭の難易度切替スライド分、index=curSection
}
/* 602px基準で比例スケール（PCは等倍上限・中央寄せ） */
function scaleHome(){
  const el=document.getElementById("homewrap");if(!el)return;
  // 機種ごとに幅・高さ（セーフエリア控除後）の両方に収まるスケールを採用（下詰まり防止）
  const app=document.querySelector(".app");
  const cs=app?getComputedStyle(app):null;
  const padV=cs?((parseFloat(cs.paddingTop)||0)+(parseFloat(cs.paddingBottom)||0)):0;
  // iOS Safariの下部ツールバー(フッター)を考慮: visualViewportの実高さ−安全マージン12px
  const vvh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||1178;
  // 広告フッター表示中はその高さ分だけ縮めて、スタートボタンが隠れないようにする
  const adf=document.getElementById("ad-footer");
  const adH=(adf&&document.body.classList.contains("has-adfooter"))?adf.offsetHeight:0;
  const availH=Math.max(300,vvh-padV-12-adH);
  const appW=app?app.clientWidth:Math.min(window.innerWidth||602,602);
  const s=Math.min(appW/602,availH/1178,1);
  el.style.transform=`scale(${s})`; // #s-homeのjustify-content:center+origin:top centerで水平中央は自動
  el.style.setProperty("--inv",String(1/s)); // スケール補正係数（ステータス内をPWR詳細ページと同じ実寸にする）
  el.style.marginBottom=`-${Math.round(1178*(1-s))}px`; // transformはレイアウト高を変えないため余白を回収
}
window.addEventListener("resize",scaleHome);
if(window.visualViewport)window.visualViewport.addEventListener("resize",scaleHome); // ツールバー出入りに追従

/* 今日学ぶべき単語の帯：忘却が進みPWR回復効率が高い語（urgent/review）を優先度順に12語流す */
function buildTodayBand(){
  const band=document.getElementById("today-band"),track=document.getElementById("tb-track");
  if(!band||!track)return;
  const stats=loadStats(),now=Date.now();
  const cands=Object.keys(stats).map(id=>{
    const w=WORD_BY_ID[id];if(!w)return null;
    const st=getStat(id,stats);
    return{w,st,state:wordState(st,now),ps:priorityScore(w,st,now)};
  }).filter(Boolean).filter(x=>x.state==="urgent"||x.state==="review")
    .sort((a,b)=>b.ps-a.ps).slice(0,12);
  if(!cands.length){band.style.display="none";return;}
  band.style.display="flex";
  const cards=cands.map(x=>`<div class="tb-card"><div class="tb-ko">${esc(x.w.ko)}</div><div class="tb-ja">${esc(x.w.ja)}</div></div>`).join("");
  track.innerHTML=cards+cards; // 同一内容を2周並べてシームレスループ
}

};
const DTAG_JA={semantic_close:"意味類似",same_scene:"場面連想",context_related:"周辺概念",form_similar:"表記類似",category_neighbor:"同カテゴリ",broader_narrower:"上位・下位概念",cultural_confusion:"文化混同",role_confusion:"人物関係の混同"};
const WERR_JA={phonetic_spelling:"音写ミス",semantic_substitution:"意味置換",unclassified:"未分類"};
const WDET_JA={final_consonant_confusion:"パッチム混同",initial_consonant_confusion:"初声子音の混同",vowel_confusion:"母音の混同",tense_aspirated_confusion:"平音・激音・濃音の混同",compound_vowel_confusion:"合成母音の混同",spacing_error:"分かち書きの誤り"};
const CONF_JA={analyzing:"分析中",provisional:"仮タイプ",current:"現在のタイプ",detailed:"詳細タイプ"};

/* --- 書き取り誤答の分類（初声・中声・終声に分解して差分判定） --- */
const KO_INDEX={};Object.values(WORD_BY_ID).forEach(w=>{KO_INDEX[w.ko.replace(/[\s~〜・･]/g,"")]=w;});
const TENSE_GROUPS=[["ㄱ","ㅋ","ㄲ"],["ㄷ","ㅌ","ㄸ"],["ㅂ","ㅍ","ㅃ"],["ㅈ","ㅊ","ㅉ"],["ㅅ","ㅆ"]];
const COMPOUND_V=new Set(["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"]);
function _decompSyl(ch){const c=ch.codePointAt(0);if(c<0xAC00||c>0xD7A3)return null;const s=c-0xAC00;return{cho:CHO[Math.floor(s/588)],jung:JUNG[Math.floor((s%588)/28)],jong:JONG[s%28]||""};}
function _sameTense(a,b){return TENSE_GROUPS.some(g=>g.includes(a)&&g.includes(b));}
function _lev(a,b){const m=a.length,n=b.length,D=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
 for(let j=0;j<=n;j++)D[0][j]=j;
 for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)D[i][j]=Math.min(D[i-1][j]+1,D[i][j-1]+1,D[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
 return D[m][n];}
function phoneticDetail(inp,cor){
  const A=[...inp],B=[...cor],L=Math.min(A.length,B.length),found=[];
  for(let i=0;i<L;i++){
    if(A[i]===B[i])continue;
    const a=_decompSyl(A[i]),b=_decompSyl(B[i]);if(!a||!b)continue;
    const dc=a.cho!==b.cho,dv=a.jung!==b.jung,dj=a.jong!==b.jong;
    if(dc&&!dv&&!dj)found.push(_sameTense(a.cho,b.cho)?"tense_aspirated_confusion":"initial_consonant_confusion");
    else if(dv&&!dc&&!dj)found.push((COMPOUND_V.has(a.jung)||COMPOUND_V.has(b.jung))?"compound_vowel_confusion":"vowel_confusion");
    else if(dj&&!dc&&!dv)found.push("final_consonant_confusion");
  }
  const pri=["tense_aspirated_confusion","compound_vowel_confusion","final_consonant_confusion","vowel_confusion","initial_consonant_confusion"];
  return pri.find(p=>found.includes(p))||null;
}
function classifyWritingError(input,w){
  const norm=s=>String(s||"").replace(/[\s~〜・･]/g,"");
  const inp=norm(input),cor=norm(w.ko);
  if(!inp)return{type:"unclassified",detail:null,wrongWordId:null};
  const other=KO_INDEX[inp];
  if(other&&other.id!==w.id){ // 優先1: 意味置換（登録済み単語＋カテゴリ/意味/関連語）
    const rel=(other.cat&&w.cat&&other.cat===w.cat)||sharedKanji(other.ja,w.ja)||cor.includes(inp)||inp.includes(cor)||jaHead(other)===jaHead(w);
    if(rel)return{type:"semantic_substitution",detail:null,wrongWordId:other.id};
  }
  const dist=_lev([...inp],[...cor]); // 優先2: 音写（編集距離2以内 または 類似率65%以上）
  const sim=1-dist/Math.max([...inp].length,[...cor].length);
  if(dist<=2||sim>=0.65)return{type:"phonetic_spelling",detail:phoneticDetail(inp,cor),wrongWordId:null};
  if(other&&other.id!==w.id)return{type:"semantic_substitution",detail:null,wrongWordId:other.id};
  return{type:"unclassified",detail:null,wrongWordId:null}; // 優先3: 未分類
}

/* --- 判定対象履歴: 直近90日かつ直近300回答。recency重み exp(-days/45) --- */
function diagWindow(){
  const now=Date.now();
  return loadHistory()
    .filter(r=>(now-new Date(r.answeredAt).getTime())/86400000<=90)
    .slice(-300)
    .map(r=>({r,w:Math.exp(-((now-new Date(r.answeredAt).getTime())/86400000)/45)}));
}
function computeDiagnosis(){
  const win=diagWindow();
  const CTX=["same_scene","context_related","category_neighbor","broader_narrower","cultural_confusion","role_confusion"];
  // 軸1: 誤答固定率（同一単語2回以上誤答の加重平均、3語未満は分析中）
  const wrongs=win.filter(x=>x.r.answerType==="choice"&&x.r.answerStatus==="incorrect"&&x.r.userAnswer);
  const byWord={};wrongs.forEach(x=>{(byWord[x.r.wordId]=byWord[x.r.wordId]||[]).push(x);});
  let n1=0,num=0,den=0;
  Object.values(byWord).forEach(arr=>{
    if(arr.length<2)return;n1++;
    const cnt={};let ws=0;arr.forEach(x=>{cnt[x.r.userAnswer]=(cnt[x.r.userAnswer]||0)+1;ws+=x.w;});
    num+=(Math.max(...Object.values(cnt))/arr.length)*ws;den+=ws;
  });
  const s1=den?num/den*100:null;
  const hasData=win.length>0; // 履歴が1件でもあれば未確定軸は右側(U/C/S/D)を既定として必ず4文字を確定
  const axis1={no:1,score:s1,code:s1!=null?(s1>=60?"F":"U"):(hasData?"U":null),n:n1,need:Math.max(0,3-n1),provisional:n1<3};
  // 軸2: 意味類似誤答率（10件未満は仮判定）
  let sem=0,ctx=0,n2=0;
  wrongs.forEach(x=>{const t=x.r.distractorType;if(!t)return;
    if(t==="semantic_close"){sem+=x.w;n2++;}else if(CTX.includes(t)){ctx+=x.w;n2++;}});
  const s2=(sem+ctx)>0?sem/(sem+ctx)*100:null;
  const axis2={no:2,score:s2,code:s2!=null?(s2>=55?"M":"C"):(hasData?"C":null),n:n2,need:Math.max(0,10-n2),provisional:n2<10};
  // 軸3: 音写率（分類可能誤答5件未満は分析中）
  let ph=0,ss=0,n3=0;
  win.forEach(x=>{const t=x.r.writingErrorType;
    if(t==="phonetic_spelling"){ph+=x.w;n3++;}else if(t==="semantic_substitution"){ss+=x.w;n3++;}});
  const s3=(ph+ss)>0?ph/(ph+ss)*100:null;
  const axis3={no:3,score:s3,code:s3!=null?(s3>=55?"P":"S"):(hasData?"S":null),n:n3,need:Math.max(0,5-n3),provisional:n3<5};
  // 軸4: 瞬発誤答 vs 熟考正答（四択のみ、わからない/時間切れ除外、20件未満は仮判定）
  const elig=win.filter(x=>x.r.answerType==="choice"&&(x.r.answerStatus==="correct"||x.r.answerStatus==="incorrect"));
  let qw=0,dc=0,tw=0;
  elig.forEach(x=>{tw+=x.w;
    if(!x.r.isCorrect&&x.r.responseTimeMs<3000)qw+=x.w;
    else if(x.r.isCorrect&&x.r.responseTimeMs>=3000)dc+=x.w;});
  const s4=(qw+dc)>0?qw/(qw+dc)*100:null;
  const axis4={no:4,score:s4,code:elig.length?((tw?qw/tw:0)>(tw?dc/tw:0)?"Q":"D"):(hasData?"D":null),n:elig.length,need:Math.max(0,20-elig.length),provisional:elig.length<20};
  const n=win.length;
  const confidence=n<30?"analyzing":n<100?"provisional":n<300?"current":"detailed";
  const axes=[axis1,axis2,axis3,axis4];
  return{axes,n,confidence,code:axes.map(a=>a.code||"?").join(""),complete:axes.every(a=>a.code)};
}

/* --- 外枠カラー（スコアで左右色を滑らかに補間。未確定軸は中間色） --- */
function lerpHex(h1,h2,t){
  const a=parseInt(h1.slice(1),16),b=parseInt(h2.slice(1),16);
  const f=(sa,sb)=>Math.round(sa+(sb-sa)*t);
  return"#"+((1<<24)|(f(a>>16,b>>16)<<16)|(f((a>>8)&255,(b>>8)&255)<<8)|f(a&255,b&255)).toString(16).slice(1);
}
function axisColor(ax,axis){return lerpHex(AXIS_COLORS[ax.R],AXIS_COLORS[ax.L],(axis.score==null?50:axis.score)/100);}
function frameColors(d){const o={};AXES.forEach((ax,i)=>o[ax.side]=axisColor(ax,d.axes[i]));return o;}
function applyFrameColors(d){
  const fc=frameColors(d),el=document.getElementById("tframe");
  if(!el)return;
  el.style.borderTopColor=fc.top;el.style.borderRightColor=fc.right;
  el.style.borderBottomColor=fc.bottom;el.style.borderLeftColor=fc.left;
}

/* --- 診断結果の保存（上書きせず履歴として追記） --- */
const LS_DIAG="kwt_diag_v1";
function loadDiag(){try{return JSON.parse(localStorage.getItem(LS_DIAG)||"[]");}catch(e){return[];}}
function charPathFor(d){return d.complete?`characters/${d.code.toLowerCase()}.svg`:"characters/analyzing.svg";}
function updateDiagnosis(){
  const d=computeDiagnosis();
  const hist=loadDiag(),last=hist[hist.length-1]||null;
  const changed=!last||last.diagnosisCode!==d.code||last.confidenceLevel!==d.confidence;
  if(changed){
    const fc=frameColors(d),rd=v=>v==null?null:Math.round(v);
    hist.push({userId:getUserId(),diagnosisCode:d.code,
      axis1Code:d.axes[0].code,axis1Score:rd(d.axes[0].score),
      axis2Code:d.axes[1].code,axis2Score:rd(d.axes[1].score),
      axis3Code:d.axes[2].code,axis3Score:rd(d.axes[2].score),
      axis4Code:d.axes[3].code,axis4Score:rd(d.axes[3].score),
      confidenceLevel:d.confidence,frameColors:fc,characterImagePath:charPathFor(d),
      calculatedAt:new Date().toISOString()});
    if(hist.length>200)hist.splice(0,hist.length-200);
    localStorage.setItem(LS_DIAG,JSON.stringify(hist));
  }
  applyFrameColors(d);refreshHomeType(d);
  return{diag:d,changed,prevCode:last?last.diagnosisCode:null};
}

/* --- ホーム上部のタイプ表示 --- */
function nextHint(d){
  if(d.n<30)return`あと${30-d.n}問で、仮タイプが表示されます`;
  const miss=d.axes.filter(a=>!a.code);
  if(miss.length){
    const m=miss[0];
    if(m.no===1)return"同じ単語での誤答が増えると、軸1が判定されます";
    if(m.no===3)return`書き取りの誤答があと${m.need}件で、軸3が判定されます`;
    return"履歴が増えると、残りの軸が判定されます";
  }
  if(d.n<100)return`あと${100-d.n}問で「現在のタイプ」になります`;
  if(d.n<300)return`あと${300-d.n}問で「詳細タイプ」になります`;
  return"";
}

        <div class="t-job">${any?esc((TYPE_INFO[fullCode]||[""])[0]):""}</div>

  }
}

/* ============================================================ ハングルIME（2ボル式 文字合成） ============================================================ */
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CHO_I={},JUNG_I={},JONG_I={};
CHO.forEach((c,i)=>CHO_I[c]=i);JUNG.forEach((c,i)=>JUNG_I[c]=i);JONG.forEach((c,i)=>{if(c)JONG_I[c]=i});
const COMB_JUNG={"ㅗㅏ":"ㅘ","ㅗㅐ":"ㅙ","ㅗㅣ":"ㅚ","ㅜㅓ":"ㅝ","ㅜㅔ":"ㅞ","ㅜㅣ":"ㅟ","ㅡㅣ":"ㅢ"};
const DEC_JUNG={"ㅘ":["ㅗ","ㅏ"],"ㅙ":["ㅗ","ㅐ"],"ㅚ":["ㅗ","ㅣ"],"ㅝ":["ㅜ","ㅓ"],"ㅞ":["ㅜ","ㅔ"],"ㅟ":["ㅜ","ㅣ"],"ㅢ":["ㅡ","ㅣ"]};
const COMB_JONG={"ㄱㅅ":"ㄳ","ㄴㅈ":"ㄵ","ㄴㅎ":"ㄶ","ㄹㄱ":"ㄺ","ㄹㅁ":"ㄻ","ㄹㅂ":"ㄼ","ㄹㅅ":"ㄽ","ㄹㅌ":"ㄾ","ㄹㅍ":"ㄿ","ㄹㅎ":"ㅀ","ㅂㅅ":"ㅄ"};
const DEC_JONG={"ㄳ":["ㄱ","ㅅ"],"ㄵ":["ㄴ","ㅈ"],"ㄶ":["ㄴ","ㅎ"],"ㄺ":["ㄹ","ㄱ"],"ㄻ":["ㄹ","ㅁ"],"ㄼ":["ㄹ","ㅂ"],"ㄽ":["ㄹ","ㅅ"],"ㄾ":["ㄹ","ㅌ"],"ㄿ":["ㄹ","ㅍ"],"ㅀ":["ㄹ","ㅎ"],"ㅄ":["ㅂ","ㅅ"]};
const isVowel=j=>JUNG_I[j]!==undefined;
const isValidJong=j=>JONG_I[j]!==undefined;

const IME={
  cho:null,jung:null,jong:null,committed:"",
  reset(){this.cho=this.jung=this.jong=null;this.committed="";},
  _renderBlock(cho,jung,jong){
    if(cho===null&&jung===null)return"";
    if(cho!==null&&jung===null)return cho;
    if(cho===null&&jung!==null)return jung;
    const ti=jong?JONG_I[jong]:0;
    return String.fromCharCode(0xAC00+(CHO_I[cho]*21+JUNG_I[jung])*28+ti);
  },
  _render(){return this._renderBlock(this.cho,this.jung,this.jong);},
  text(){return this.committed+this._render();},
  commit(){this.committed+=this._render();this.cho=this.jung=this.jong=null;},
  input(j){ isVowel(j)?this._vowel(j):this._cons(j); },
  _cons(j){
    if(this.cho===null&&this.jung===null&&this.jong===null){this.cho=j;return;}
    if(this.cho!==null&&this.jung===null){this.commit();this.cho=j;return;}
    if(this.cho===null&&this.jung!==null){this.commit();this.cho=j;return;}
    if(this.jong===null){
      if(isValidJong(j))this.jong=j; else{this.commit();this.cho=j;}
      return;
    }
    const c=COMB_JONG[this.jong+j];
    if(c)this.jong=c; else{this.commit();this.cho=j;}
  },
  _vowel(j){
    if(this.cho===null&&this.jung===null){this.jung=j;return;}
    if(this.cho!==null&&this.jung===null){this.jung=j;return;}
    if(this.jong===null){
      const c=COMB_JUNG[this.jung+j];
      if(c)this.jung=c; else{this.commit();this.jung=j;}
      return;
    }
    // 終声あり → 終声の最後の子音を次の音節の初声へ移動
    const d=DEC_JONG[this.jong];
    let baseJong,movedCho;
    if(d){baseJong=d[0];movedCho=d[1];} else {baseJong=null;movedCho=this.jong;}
    this.committed+=this._renderBlock(this.cho,this.jung,baseJong);
    this.cho=movedCho;this.jung=j;this.jong=null;
  },
  space(){this.commit();this.committed+=" ";},
  backspace(){
    if(this.jong!==null){const d=DEC_JONG[this.jong];this.jong=d?d[0]:null;return;}
    if(this.jung!==null){const d=DEC_JUNG[this.jung];this.jung=d?d[0]:null;return;}
    if(this.cho!==null){this.cho=null;return;}
    if(this.committed.length>0){
      const last=this.committed[this.committed.length-1];
      this.committed=this.committed.slice(0,-1);
      const code=last.charCodeAt(0);
      if(code>=0xAC00&&code<=0xD7A3){
        const s=code-0xAC00;
        this.cho=CHO[Math.floor(s/(21*28))];
        this.jung=JUNG[Math.floor((s%(21*28))/28)];
        const ti=s%28;this.jong=ti?JONG[ti]:null;
        this.backspace();
      }
    }
  }
};

/* --- 単語別の記憶状態（忘却/形成モデル）。係数はconfigで外出し（後から調整可能） --- */
const MEMORY_CONFIG={
  initialMemoryScore:0, initialFormingScore:0,
  initialStabilityHours:12, initialFormingStabilityHours:12,
  minStabilityHours:6, maxStabilityHours:720, reviewThreshold:70,
  defaultWordDifficulty:1.0, minWordDifficulty:0.7, maxWordDifficulty:1.5,
  historyDecayLambda:0.08, accuracyBonusWeight:0.5,
  dailyGainMax:0.25, dailyGainK:0.8,
  predictionLearningRateGamma:0.25,
  correctActualMin:60, correctActualMax:95, responseSpeedAlpha:0.10,
  formingIncorrectGain:5, formingUnknownGain:3, formingTimeoutGain:2, firstCorrectMemoryScore:45,
  choiceFastCorrectDelta:12, choiceNormalCorrectDelta:8,
  writingFastCorrectDelta:18, writingNormalCorrectDelta:14,
  choiceIncorrectDelta:-15, writingIncorrectDelta:-18, unknownDelta:-18, timeoutDelta:-18,
  hintMultiplier:0.5,
  actualIncorrect:25, actualUnknown:10, actualTimeout:15,
  fastChoiceSec:5, fastWritingSec:10
};
const DEFAULT_SCORE=0; // 互換: 未学習語の初期記憶スコア
function clampN(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function loadStats(){try{return JSON.parse(localStorage.getItem(LS_STATS)||"{}");}catch(e){return{};}}
function saveStats(s){localStorage.setItem(LS_STATS,JSON.stringify(s));}
function defaultStat(){const C=MEMORY_CONFIG;return{
  hasSeen:false,hasEverCorrect:false,
  memoryScore:C.initialMemoryScore,formingScore:C.initialFormingScore,
  stabilityHours:C.initialStabilityHours,wordDifficulty:C.defaultWordDifficulty,
  lastReviewedAt:null,firstCorrectAt:null,lastReviewDay:null,nextReviewAt:null,
  reviewCount:0,correctCount:0,incorrectCount:0,sameDayCorrectCount:0,
  consecutiveCorrectCount:0,averageResponseTimeMs:0,
  lastAnswerStatus:null,lastAnswerType:null,lastResponseTimeSec:null,isHintProvided:false};}
function getStat(id,store){
  const raw=(store||loadStats())[id];
  const st=raw?Object.assign(defaultStat(),raw):defaultStat();
  st.wordId=id;
  // --- 旧データ移行: 新フィールドが無い既存statを補完 ---
  if(raw){
    if(raw.hasSeen===undefined)st.hasSeen=raw.lastReviewedAt!=null;
    if(raw.hasEverCorrect===undefined)st.hasEverCorrect=(raw.correctCount||0)>0;
    if(raw.stabilityHours===undefined)st.stabilityHours=clampN(12*(1+(raw.consecutiveCorrectCount||0))+6*(raw.correctCount||0),MEMORY_CONFIG.minStabilityHours,MEMORY_CONFIG.maxStabilityHours);
    if(raw.wordDifficulty===undefined)st.wordDifficulty=MEMORY_CONFIG.defaultWordDifficulty;
  }
  return st;
}
/* 履歴を単語ごとに索引（重い再計算を避けるためキャッシュ。saveAnswerで無効化） */
let _histIdxCache=null;
function histByWord(){
  if(_histIdxCache)return _histIdxCache;
  const m={};loadHistory().forEach(r=>{(m[r.wordId]=m[r.wordId]||[]).push(r);});
  for(const k in m)m[k].sort((a,b)=>String(a.answeredAt).localeCompare(String(b.answeredAt)));
  _histIdxCache=m;return m;
}
function dayKey(ms){const d=new Date(ms);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
/* Ba: 時間減衰付き正答率補正（最近の回答ほど重い） */
function accuracyBonus(wordId,nowMs){
  const C=MEMORY_CONFIG,recs=histByWord()[wordId]||[];
  if(!recs.length)return 1;
  let num=0,den=0;
  recs.forEach(r=>{const dt=Math.max(0,(nowMs-new Date(r.answeredAt).getTime())/86400000);const w=Math.exp(-C.historyDecayLambda*dt);den+=w;num+=w*(r.isCorrect?1:0);});
  return 1+C.accuracyBonusWeight*(den>0?num/den:0);
}
/* Cd: 同日定着上限補正（その日の同一単語の正解回数で頭打ち） */
function dailyConsolidationBonus(st,nowMs){
  const C=MEMORY_CONFIG;
  const n=(st.lastReviewDay===dayKey(nowMs))?(st.sameDayCorrectCount||0):0;
  return 1+C.dailyGainMax*(1-Math.exp(-C.dailyGainK*n));
}
/* 実効安定度 = Su * Ba * Cd / Dw */
function effectiveStability(st,nowMs){
  const C=MEMORY_CONFIG;
  const Su=clampN(st.stabilityHours||C.initialStabilityHours,C.minStabilityHours,C.maxStabilityHours);
  const Dw=clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty);
  return Math.max(1,Su*accuracyBonus(st.wordId,nowMs)*dailyConsolidationBonus(st,nowMs)/Dw);
}
/* 現在の推定記憶率（初正解前は形成スコアの減衰、初正解後は忘却曲線） */
function displayMemoryScore(st,nowMs){
  const C=MEMORY_CONFIG;
  if(!st||st.lastReviewedAt==null)return 0; // 未接触=0
  const t=(nowMs-new Date(st.lastReviewedAt).getTime())/3600000;
  if(!st.hasEverCorrect){
    const Dw=clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty);
    return (st.formingScore||0)*Math.exp(-(t*Dw)/C.initialFormingStabilityHours);
  }
  return (st.memoryScore||0)*Math.exp(-t/effectiveStability(st,nowMs));
}
function displayScore(st,nowMs){return displayMemoryScore(st,nowMs);} // 互換エイリアス
function stabilityHours(st){return effectiveStability(st,Date.now());} // 互換（hoursTo70等）
/* 単語状態の分類（new/forming/urgent/review/stabilizing/stable） */
function wordState(st,nowMs){
  if(!st||!st.hasSeen&&st.lastReviewedAt==null)return"new";
  if(!st.hasEverCorrect)return"forming";
  const M=displayMemoryScore(st,nowMs);
  if(M<40)return"urgent";
  if(M<70)return"review";
  if(M<85)return"stabilizing";
  return"stable";
}
function overallCondition(nowMs){const s=loadStats();let t=0;WORDS.forEach(w=>t+=displayScore(getStat(w.id,s),nowMs));return t/WORDS.length;}
function reviewNeedCount(nowMs){const s=loadStats();return WORDS.filter(w=>displayScore(getStat(w.id,s),nowMs)<MEMORY_CONFIG.reviewThreshold).length;}

/* 既存の音声ファイルが word.audio に登録されていればそれを優先。無ければSpeechSynthesisで ko-KR 読み上げ。 */
/* 効果音（WebAudio合成）。スタート時とプレゼント受け取り時 */
let _sfxCtx=null;
function _sfx(){try{_sfxCtx=_sfxCtx||new (window.AudioContext||window.webkitAudioContext)();if(_sfxCtx.state==="suspended")_sfxCtx.resume();return _sfxCtx;}catch(e){return null;}}
function _tone(ctx,freq,t0,dur,vol,type){const o=ctx.createOscillator(),g=ctx.createGain();o.type=type||"sine";o.frequency.value=freq;
  g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(ctx.destination);o.start(t0);o.stop(t0+dur+0.05);}
function sfxStart(){const c=_sfx();if(!c)return;const t=c.currentTime; _tone(c,440,t,0.09,0.22,"sawtooth");_tone(c,660,t+0.07,0.09,0.22,"sawtooth");_tone(c,990,t+0.14,0.26,0.24,"triangle");} // 出発の3音上昇
function sfxClaim(){const c=_sfx();if(!c)return;const t=c.currentTime;[523,659,784,1047].forEach((f,i)=>_tone(c,f,t+i*0.07,0.3,0.22,"triangle"));_tone(c,1568,t+0.3,0.45,0.12,"sine");}
let _koVoice=null,_curAudio=null;
function _pickKoVoice(){
  if(!('speechSynthesis' in window))return;
  const vs=window.speechSynthesis.getVoices()||[];
  _koVoice=vs.find(v=>v.lang==="ko-KR")||vs.find(v=>v.lang&&v.lang.toLowerCase().replace("_","-").indexOf("ko")===0)||null;
}
if('speechSynthesis' in window){_pickKoVoice();window.speechSynthesis.onvoiceschanged=_pickKoVoice;}
function stopSpeak(){
  try{ if('speechSynthesis' in window)window.speechSynthesis.cancel(); }catch(e){}
  try{ if(_curAudio){_curAudio.pause();_curAudio.currentTime=0;_curAudio=null;} }catch(e){}
}
function speakKorean(word){
  // 再生失敗してもテストは止めない（全てtry/catchで握りつぶす）
  try{
    stopSpeak(); // 前の問題の音声が残っていれば停止し、重複再生を防ぐ
    if(word&&word.audio){
      const a=new Audio(word.audio);_curAudio=a;
      a.play().catch(()=>{ _speakTTS(word.ko); }); // ファイル再生失敗時はTTSへフォールバック
      return;
    }
    _speakTTS(word?word.ko:"");
  }catch(e){}
}
function _speakTTS(text){
  try{
    if(!('speechSynthesis' in window)||!text)return;
    if(!_koVoice)_pickKoVoice();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ko-KR";u.rate=0.9;u.pitch=1.0;
    if(_koVoice)u.voice=_koVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ============================================================ 出題ロジック ============================================================ */
const PLAN=[...Array(5).fill("jk"),...Array(5).fill("kj"),...Array(2).fill("w")];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}
/* ---- 紛らわしい選択肢の生成（品詞一致＋類似度スコア） ---- */
/* 品詞判定: 〜다=用言（訳が い/だ 終わり=形容詞、他=動詞）、訳が に/く/と 終わり=副詞、他=名詞 */
function posOf(w){
  if(w._pos)return w._pos;
  const j=(w.ja||"").split(/[、,（(]/)[0].trim();
  let p;
  if(/다$/.test(w.ko.replace(/\s/g,"")))p=/(い|だ)$/.test(j)?"adj":"verb";
  else if(j.length>=2&&/[にくと]$/.test(j))p="adv";
  else p="noun";
  return w._pos=p;
}
/* 韓国語の見た目の紛らわしさ：頭音節・末尾一致、共有音節、長さ近似 */
function simKo(a,b){
  const A=[...a.ko.replace(/[^가-힣]/g,"")],B=[...b.ko.replace(/[^가-힣]/g,"")];
  let s=0;
  if(A[0]===B[0])s+=3;
  if(A[A.length-1]===B[B.length-1])s+=2;
  s+=Math.max(0,2-Math.abs(A.length-B.length));
  const setB=new Set(B);new Set(A).forEach(ch=>{if(setB.has(ch))s+=1;});
  return s;
}
/* 日本語訳の紛らわしさ：共有漢字＋長さ近似 */
function simJa(a,b){
  const A=new Set([...a.ja].filter(c=>/[一-龯々]/.test(c)));
  let s=0;new Set([...b.ja]).forEach(c=>{if(A.has(c))s+=2;});
  s+=Math.max(0,2-Math.abs(a.ja.length-b.ja.length))*0.5;
  return s;
}
/* 第一義（最初の訳語）。同義語を誤答に混ぜない判定に使う */
function jaHead(w){return (w.ja||"").split(/[、,（(]/)[0].trim();}
function sharedKanji(a,b){const A=new Set([...String(a)].filter(c=>/[一-龯々]/.test(c)));return [...String(b)].some(c=>A.has(c));}
/* 誤答タグ：2語の実際の関係から決定（タイプ診断 軸2用） */
function relationTag(w,x,key){
  if(sharedKanji(w.ja,x.ja))return"semantic_close";          // 意味類似（訳の漢字共有）
  if(w.cat&&x.cat&&w.cat===x.cat){
    if(w.cat==="家族・人物")return"role_confusion";          // 人物・家族関係の混同
    if(w.cat==="韓国文化")return"cultural_confusion";        // 韓国文化上の混同
    return"same_scene";                                      // 同じ場面
  }
  if(key==="ko"&&simKo(w,x)>=4)return"form_similar";         // 音・表記類似
  return"context_related";                                   // 周辺概念
}
/* 品詞を合わせつつ「意味類似＋場面連想＋周辺/表記類似」の構成で3つ選ぶ */
function pickTaggedDistractors(w,pool,key){
  const pos=posOf(w);
  const base=pool.filter(x=>x.id!==w.id&&x[key]!==w[key]&&x.ko!==w.ko&&jaHead(x)!==jaHead(w));
  let cands=base.filter(x=>posOf(x)===pos);
  if(cands.length<6)cands=base.filter(x=>(pos==="adj"||pos==="verb")?(posOf(x)==="adj"||posOf(x)==="verb"):(posOf(x)==="noun"||posOf(x)==="adv"));
  if(cands.length<6)cands=base;
  const used=new Set([w[key]]),out=[];
  const take=arr=>{for(const x of arr){if(!used.has(x[key])){used.add(x[key]);out.push({text:x[key],type:relationTag(w,x,key),wordId:x.id});return;}}};
  const bySem=shuffle(cands).sort((a,b)=>simJa(w,b)-simJa(w,a));   // 意味類似（漢字共有）優先
  const byScene=shuffle(cands).sort((a,b)=>((b.cat&&b.cat===w.cat)?1:0)-((a.cat&&a.cat===w.cat)?1:0)||simJa(w,b)-simJa(w,a));
  const byForm=shuffle(cands).sort((a,b)=>simKo(w,b)-simKo(w,a));  // 表記類似（韓国語の見た目）
  take(bySem.slice(0,6));
  take(byScene);
  take(key==="ko"?byForm.slice(0,6):byScene);
  for(const x of bySem){if(out.length>=3)break;if(!used.has(x[key])){used.add(x[key]);out.push({text:x[key],type:relationTag(w,x,key),wordId:x.id});}}
  return out.slice(0,3);
}
/* 選択肢セット（タグ付きメタ込み）。Section01の手作り誤答(d)は漢字共有で意味類似/場面連想に自動タグ付け */
function buildChoiceSet(w,pool,key){
  const meta={};meta[w[key]]={distractorType:null,wordId:w.id};
  const ds=(key==="ja"&&w.d)
    ?w.d.slice(0,3).map(t=>({text:t,type:sharedKanji(w.ja,t)?"semantic_close":"same_scene",wordId:null}))
    :pickTaggedDistractors(w,pool,key);
  ds.forEach(d=>{meta[d.text]={distractorType:d.type,wordId:d.wordId};});
  return{choices:shuffle([w[key],...ds.map(d=>d.text)]),meta};
}

/* 誤答候補は同レベルの全語彙から（強雨量/降水量のような紛らわしいペアを拾えるように） */
function levelAllWords(){return curLevel==="beginner"?BEGINNER_WORDS:WORDS.concat(MIDDLE_WORDS);}

/* idリスト(+source)からPLANに沿って12問を生成。誤答はタグ付き（品詞一致＋意味類似/場面連想/周辺概念の構成） */
function makeQuestionsFromIds(list){
  const pool=levelAllWords();
  return list.slice(0,12).map((c,i)=>{
    const w=WORD_BY_ID[c.id],type=PLAN[i];
    let choices=null,correct,cmeta=null;
    if(type==="kj"){const cs=buildChoiceSet(w,pool,"ja");correct=w.ja;choices=cs.choices;cmeta=cs.meta;}
    else if(type==="jk"){const cs=buildChoiceSet(w,pool,"ko");correct=w.ko;choices=cs.choices;cmeta=cs.meta;}
    else{correct=w.ko;}
    return {word:w,type,choices,correct,source:c.source,cmeta};
  });
}

/* 復習枠の候補を優先順位順に並べて n 件返す（現在Sectionの単語のみ） */
function pickReview(n,excludeIds,prog,stats){
  if(n<=0)return[];
  const poolSet=new Set(sectionIds());
  const exclude=new Set(excludeIds);
  const last=prog.lastTestIds||[],prev=prog.prevTestIds||[];
  const blocked=new Set(last.filter(id=>prev.includes(id))); // 直近2回連続→3回目を避ける
  const cand=[];
  const push=arr=>arr.forEach(id=>{if(poolSet.has(id)&&!exclude.has(id)&&!blocked.has(id)&&!cand.includes(id))cand.push(id);});
  const slow=id=>{const s=stats[id];return s&&s.lastAnswerStatus==="correct"&&s.averageResponseTimeMs>(s.lastAnswerType==="writing"?10000:5000);};
  push(last.filter(id=>{const s=stats[id];return s&&["incorrect","timeout","unknown"].includes(s.lastAnswerStatus);})); // 1.直前で不正解等
  push(last.filter(slow));                                                                                              // 2.直前で正解だが遅い
  push([...last,...prev]);                                                                                              // 3.直近1〜3回
  push(Object.keys(stats).map(Number).sort((a,b)=>(stats[b].lastReviewedAt||"").localeCompare(stats[a].lastReviewedAt||""))); // 4.過去出題済み
  return cand.slice(0,n);
}

/* 通常テスト：新出枠9＋復習枠3。現在Sectionの単語群と進捗で管理 */
/* 各単語の優先度スコア（忘れそう/緊急/難/直近ミス/形成必要/重要度） */
function priorityScore(w,st,nowMs){
  const C=MEMORY_CONFIG;
  const disp=displayMemoryScore(st,nowMs);
  const forgettingRisk=100-disp;
  const urgency=(st.nextReviewAt&&new Date(st.nextReviewAt).getTime()<=nowMs)?100:(st.hasSeen?0:100);
  const difficulty=(clampN(st.wordDifficulty||C.defaultWordDifficulty,C.minWordDifficulty,C.maxWordDifficulty)-C.minWordDifficulty)/(C.maxWordDifficulty-C.minWordDifficulty)*100;
  const recentMistake=(st.hasSeen&&st.lastAnswerStatus!=="correct")?100:0;
  const formingNeed=!st.hasEverCorrect?100:0;
  const importance=(w.importanceScore!=null?w.importanceScore:50);
  let ps=forgettingRisk*0.30+urgency*0.20+difficulty*0.15+recentMistake*0.15+formingNeed*0.10+importance*0.10;
  const today=dayKey(nowMs);
  if(st.lastReviewDay===today&&(st.sameDayCorrectCount||0)>=2)ps*=0.4; // 同日2回以上正解は下げる
  return ps;
}
function buildQuestions(){
  const prog=loadProgress(),stats=loadStats(),nowMs=Date.now();
  const POOL_IDS=sectionIds();
  // 直近2回連続で出した単語は3回目を避ける
  const last=prog.lastTestIds||[],prev=prog.prevTestIds||[];
  const blocked=new Set(last.filter(id=>prev.includes(id)));
  // 状態分類と優先度
  // 先にシャッフル: 優先度が同点（例: 全部newの新規ROOM）のとき01から順に出ず、ランダムになる
  const info=shuffle(POOL_IDS).map(id=>{const w=WORD_BY_ID[id],st=getStat(id,stats);return{id,w,st,state:wordState(st,nowMs),ps:priorityScore(w,st,nowMs)};});
  const seen=info.filter(x=>x.st.hasSeen).length;
  const coverage=seen/Math.max(1,POOL_IDS.length);
  // カテゴリ枠（coverageが低いと探索を増やす）
  let quota=coverage<0.6?{nf:5,urgent:4,review:2,stabilizing:1,stable:0}:{nf:3,urgent:4,review:3,stabilizing:1,stable:1};
  const buckets={nf:[],urgent:[],review:[],stabilizing:[],stable:[]};
  info.forEach(x=>{
    if(blocked.has(x.id))return;
    if(x.state==="new"||x.state==="forming")buckets.nf.push(x);
    else if(x.state==="urgent")buckets.urgent.push(x);
    else if(x.state==="review")buckets.review.push(x);
    else if(x.state==="stabilizing")buckets.stabilizing.push(x);
    else buckets.stable.push(x);
  });
  for(const k in buckets)buckets[k].sort((a,b)=>b.ps-a.ps);
  // 枠ごとに抽出（偏り防止）→不足分は全体の優先度で補充
  const chosen=[],used=new Set();
  const take=(arr,n)=>{for(const x of arr){if(chosen.length>=12||n<=0)break;if(!used.has(x.id)){chosen.push(x);used.add(x.id);n--;}}};
  take(buckets.nf,quota.nf);take(buckets.urgent,quota.urgent);take(buckets.review,quota.review);take(buckets.stabilizing,quota.stabilizing);take(buckets.stable,quota.stable);
  if(chosen.length<12){
    const rest=info.filter(x=>!used.has(x.id)&&!blocked.has(x.id)).sort((a,b)=>b.ps-a.ps);
    take(rest,12-chosen.length);
  }
  if(chosen.length<12){ // それでも足りなければblocked解除して補充
    const rest=info.filter(x=>!used.has(x.id)).sort((a,b)=>b.ps-a.ps);
    take(rest,12-chosen.length);
  }
  // 形成/安定が書き取り枠(末尾2問)に来るよう並べ替え（出題形式を状態に寄せる）
  const writeRank=x=>(x.state==="stable"?3:x.state==="stabilizing"?2:0);
  chosen.sort((a,b)=>writeRank(a)-writeRank(b)); // 書き取り向きを後ろへ
  const list=chosen.slice(0,12).map(x=>({id:x.id,source:(x.state==="new"||x.state==="forming")?"new":"review"}));
  // 進捗保存（未接触の出題を記録）
  let served=new Set(prog.served||[]);
  list.forEach(c=>served.add(c.id));
  prog.served=Array.from(served);
  prog.prevTestIds=prog.lastTestIds||[];
  prog.lastTestIds=list.map(c=>c.id);
  saveProgress(prog);
  return makeQuestionsFromIds(list);
}

/* 復習テスト：指定idだけ（不足分は現在Sectionから補い12問に） */
function buildReviewQuestions(ids){
  let pool=ids.slice();
  const POOL_IDS=sectionIds();
  if(pool.length<12){ const used=new Set(pool); for(const id of shuffle(POOL_IDS.filter(id=>!used.has(id)))){ if(pool.length>=12)break; pool.push(id); } }
  const list=shuffle(pool.slice(0,12)).map(id=>({id,source:"review"}));
  const prog=loadProgress(); prog.prevTestIds=prog.lastTestIds||[]; prog.lastTestIds=list.map(c=>c.id); saveProgress(prog);
  return makeQuestionsFromIds(list);
}
const DIRECTION={jk:"jp_to_kr",kj:"kr_to_jp",w:"jp_to_kr"};
const ANS_TYPE={jk:"choice",kj:"choice",w:"writing"};

/* 採点 */
function scoreFor(type,isCorrect,t,isHint){
  if(!isCorrect)return 0;
  if(type==="w"){const base=t<10?10:9;return isHint?Math.ceil(base/2):base;} // 書き取り：ヒント付きは半分（小数は切り上げ）
  return t<5?8:7;                        // 四択：5秒未満=8, 5〜10=7
}
function rankFor(s){if(s===100)return"S";if(s<=50)return"D";if(s<=70)return"C";if(s<=80)return"B";return"A";}

/* スタート後の3・2・1カウントダウン。timer変数を共用するためquitTestで確実に止まる */
function showCountdown(cb){

  document.getElementById("time").textContent="";

function curLimit(){return state.questions[state.idx].type==="w"?20:10;}

function startTimer(){

function renderQuestion(){
  // 遷移時に音声を止めない（長い単語が途中で切れないよう最後まで再生させる）。
  // 重複防止は次の正解時に speakKorean() 側の stopSpeak() が担う。

        <button class="unknown" onclick="submit('unknown','')">わからない</button>
      </div>`;
  }else{

    const choiceCorrect=state.results.slice(0,10).filter(r=>r.isCorrect).length;
    state.choiceCorrectCount=choiceCorrect;
    const hint=choiceCorrect<=7;
    q.isHintProvided=hint;
    q.hintText=hint?([...q.word.ko].find(ch=>/[가-힣]/.test(ch))||[...q.word.ko.trim()][0]):null;
    const hintHTML=hint?`<div class="whint">ヒント：<b>${esc(q.hintText)}</b></div>`:"";
    stage.innerHTML=`
      <div class="qmain" style="flex:0 0 auto;padding-top:5vh;min-height:24vh"><div class="qword ja">${esc(q.word.ja)}</div>${hintHTML}</div>
      <div class="winput" id="winput"></div>
      ${keyboardHTML()}`;
    refreshInput();
  }
  startTimer();
}

function pick(v){const q=state.questions[state.idx];submit(v===q.correct?"correct":"incorrect",v);}

/* 回答送信（二重送信防止） */
function submit(status,userAnswer){
  if(answered)return;answered=true;clearInterval(timer);
  const q=state.questions[state.idx],limit=q.type==="w"?20:10;
  let elapsed=(performance.now()-qStart)/1000;
  if(status==="timeout")elapsed=limit; else if(elapsed>limit){elapsed=limit;status= status==="correct"?"timeout":status;}
  const isCorrect=status==="correct";
  const isHint=!!q.isHintProvided;
  const score=scoreFor(q.type,isCorrect,elapsed,isHint);
  // ---- タイプ診断用の誤答メタ ----
  let distractorType=null,selectedWrongWordId=null,writingErrorType=null,writingErrorDetail=null;
  if(q.type!=="w"){
    if(status==="incorrect"&&q.cmeta&&q.cmeta[userAnswer]){
      distractorType=q.cmeta[userAnswer].distractorType;
      selectedWrongWordId=q.cmeta[userAnswer].wordId;
    }
  }else if(status==="incorrect"){
    const cw=classifyWritingError(userAnswer,q.word);
    writingErrorType=cw.type;writingErrorDetail=cw.detail;selectedWrongWordId=cw.wrongWordId;
  }
  // ---- 記憶スコア更新（忘却/形成エンジン） ----
  const C=MEMORY_CONFIG,nowMs=Date.now(),answeredAt=new Date(nowMs).toISOString();
  const stats=loadStats(),st=getStat(q.word.id,stats);
  const isWriting=q.type==="w",r=elapsed; // 回答秒（0.1秒単位）
  const fast=isWriting?(r<C.fastWritingSec):(r<C.fastChoiceSec);
  // 前状態スナップショット
  const sBefore=st.stabilityHours,dwBefore=st.wordDifficulty,memBefore=st.memoryScore;
  const dispBefore=displayMemoryScore(st,nowMs);
  const Mp=dispBefore; // 予測記憶率
  // 実測記憶率A
  let A;
  if(isCorrect)A=C.correctActualMin+(C.correctActualMax-C.correctActualMin)*Math.exp(-C.responseSpeedAlpha*r);
  else A=(status==="incorrect")?C.actualIncorrect:(status==="timeout"?C.actualTimeout:C.actualUnknown);
  const E=A-Mp;
  // 安定度Suの更新（予測誤差で学習）
  st.stabilityHours=clampN(st.stabilityHours*Math.exp(C.predictionLearningRateGamma*E/100),C.minStabilityHours,C.maxStabilityHours);
  // 同日定着カウント
  const today=dayKey(nowMs);
  if(isCorrect){ if(st.lastReviewDay!==today)st.sameDayCorrectCount=0; st.sameDayCorrectCount=(st.sameDayCorrectCount||0)+1; }
  st.lastReviewDay=today;
  // memoryScore / formingScore
  if(!st.hasEverCorrect){
    if(isCorrect){ st.hasEverCorrect=true; st.firstCorrectAt=answeredAt; st.memoryScore=C.firstCorrectMemoryScore; } // 初正解
    else st.formingScore=(st.formingScore||0)+(status==="incorrect"?C.formingIncorrectGain:status==="timeout"?C.formingTimeoutGain:C.formingUnknownGain); // 初正解前は減点せず接触で加点
  }else{
    let delta;
    if(isCorrect)delta=isWriting?(fast?C.writingFastCorrectDelta:C.writingNormalCorrectDelta):(fast?C.choiceFastCorrectDelta:C.choiceNormalCorrectDelta);
    else delta=(status==="incorrect")?(isWriting?C.writingIncorrectDelta:C.choiceIncorrectDelta):(status==="timeout"?C.timeoutDelta:C.unknownDelta);
    if(isCorrect&&isHint)delta*=C.hintMultiplier;
    st.memoryScore=clampN(dispBefore+delta,0,100); // 現在記憶率を起点に加算しM0を更新
  }
  // 単語難易度の緩やかな適応
  if(isCorrect&&fast)st.wordDifficulty=clampN(st.wordDifficulty-0.02,C.minWordDifficulty,C.maxWordDifficulty);
  else if(!isCorrect)st.wordDifficulty=clampN(st.wordDifficulty+0.03,C.minWordDifficulty,C.maxWordDifficulty);
  // カウンタ等
  st.hasSeen=true; st.lastReviewedAt=answeredAt; st.reviewCount=(st.reviewCount||0)+1;
  if(isCorrect){st.correctCount=(st.correctCount||0)+1;st.consecutiveCorrectCount=(st.consecutiveCorrectCount||0)+1;}
  else{st.incorrectCount=(st.incorrectCount||0)+1;st.consecutiveCorrectCount=0;}
  const rtMs=Math.round(elapsed*1000);
  st.averageResponseTimeMs=st.reviewCount<=1?rtMs:Math.round((st.averageResponseTimeMs*(st.reviewCount-1)+rtMs)/st.reviewCount);
  st.lastAnswerStatus=status; st.lastAnswerType=ANS_TYPE[q.type]; st.lastResponseTimeSec=Math.round(elapsed*10)/10; st.isHintProvided=isHint;
  // 次回復習推奨日時
  const dispAfter=displayMemoryScore(st,nowMs);
  if(!st.hasEverCorrect){ st.nextReviewAt=new Date(nowMs+C.initialFormingStabilityHours*3600000).toISOString(); }
  else if(st.memoryScore<=C.reviewThreshold){ st.nextReviewAt=answeredAt; }
  else { const hrs=effectiveStability(st,nowMs)*Math.log(st.memoryScore/C.reviewThreshold); st.nextReviewAt=new Date(nowMs+Math.max(0,hrs)*3600000).toISOString(); }
  stats[q.word.id]=st; saveStats(stats);
  // 単語カード獲得: 正解=残り秒ぶん(最大10) / 不正解・unknown=残り秒÷3(最大3) / 時間切れ=0
  const remainSec=Math.max(0,limit-elapsed);
  let cardsEarned;
  if(isCorrect)cardsEarned=Math.min(10,Math.floor(remainSec));
  else if(status==="timeout")cardsEarned=0;
  else cardsEarned=Math.min(3,Math.floor(remainSec/3));
  addCards(q.word.id,cardsEarned);
  // 履歴（上書きせず全保存）
  const rec={
    userId:state.userId,wordId:q.word.id,testId:state.testId,questionNumber:state.idx+1,
    korean:q.word.ko,japanese:q.word.ja,answerType:ANS_TYPE[q.type],direction:DIRECTION[q.type],questionType:ANS_TYPE[q.type],
    userAnswer:userAnswer||"",correctAnswer:q.correct,answerStatus:status,isCorrect,
    selectedWrongWordId,distractorType,writingErrorType,writingErrorDetail,
    isHintProvided:isHint,hintText:q.hintText||null,
    cycleNumber:state.cycleNumber,questionSource:q.source||"new",
    responseTimeMs:rtMs,responseTimeSec:Math.round(elapsed*10)/10,score,answeredAt,
    memoryScoreBefore:memBefore,memoryScoreAfter:st.memoryScore,
    stabilityHoursBefore:sBefore,stabilityHoursAfter:st.stabilityHours,
    displayMemoryScoreBefore:Math.round(dispBefore),displayMemoryScoreAfter:Math.round(dispAfter),
    predictedMemory:Math.round(Mp),actualMemory:Math.round(A),predictionError:Math.round(E),
    wordDifficultyBefore:dwBefore,wordDifficultyAfter:st.wordDifficulty,
    nextReviewAt:st.nextReviewAt,cardsEarned,
    displayMemoryScoreAfterDecay:Math.round(dispAfter) // 互換
  };
  state.results.push(rec);saveAnswer(rec);
  speakKorean(q.word); // 正解・不正解・わからない・時間切れすべてで正解の韓国語音声を再生（学習のため）
  showOverlay(status,q,userAnswer);
}

/* 正誤表示：○×記号を重ねつつ、四択は選択肢を色分け、書き取りは入力/正解を色分け表示（「正解」「不正解」テキストは出さない） */
function showOverlay(status,q,userAnswer){
  const isCorrect=status==="correct";
  const ov=document.createElement("div");
  ov.className="overlay"+(q.type==="w"?" backdrop":"");
  let inner=`<div class="ovsym ${isCorrect?"o":"x"}">${isCorrect?"○":"×"}</div>`;
  if(q.type==="w"){
    inner+=writingAnsHTML(status,q,userAnswer);
  }else{
    highlightChoices(q,status,userAnswer); // 実際の選択肢ボタンを色分け（赤=正解 / 青=選んだ誤答）
  }
  const tap=loadSettings().tapAdvance;
  if(tap)inner+='<div class="tap-next">タップで次へ ›</div>';
  ov.innerHTML=inner;
  document.body.appendChild(ov);
  if(tap){
    ov.style.cursor="pointer";
    if(q.type!=="w")addChoiceSpeakers(); // 各選択肢の右端に音声マーク
    const go=(e)=>{
      if(ov._done)return;
      if(q.type!=="w"&&e){ // オーバーレイ越しに選択肢を叩いたらその単語の韓国語音声（次へは進まない）
        const hit=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el.classList&&el.classList.contains("choice"));
        if(hit){speakChoiceKo(q,hit.dataset.v);return;}
      }
      ov._done=true;ov.remove();afterAnswer();
    };
    ov.addEventListener("click",go);
  }else{
    ovTimer=setTimeout(()=>{ov.remove();afterAnswer();},isCorrect?1000:2000);
  }
}
/* 回答後（タップで次へ設定時）用：選択肢右端の音声マークと、選択肢の韓国語読み上げ */
const SPK_SVG='<svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="#fff"/><path d="M16 8.6a4.2 4.2 0 010 6.8M18.6 6.2a7.6 7.6 0 010 11.6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
function addChoiceSpeakers(){document.querySelectorAll("#qstage .choice").forEach(b=>{if(!b.querySelector(".chspk"))b.insertAdjacentHTML("beforeend",`<span class="chspk">${SPK_SVG}</span>`);});}
function speakChoiceKo(q,v){
  try{
    let ko=null;
    if(q.type==="jk")ko=v; // 選択肢自体が韓国語
    else if(v===q.correct)ko=q.word.ko;
    else{const m=q.cmeta&&q.cmeta[v];if(m&&m.wordId!=null&&WORD_BY_ID[m.wordId])ko=WORD_BY_ID[m.wordId].ko;} // Section01の手作り誤答(wordId=null)は対応する韓国語が無いため再生しない
    if(ko){stopSpeak();_speakTTS(ko);}
  }catch(e){}
}
/* 四択：正解の選択肢を赤、ユーザーが選んだ誤答を青で強調。その他は暗い灰色のまま */
function highlightChoices(q,status,userAnswer){
  document.querySelectorAll('#qstage .choice').forEach(btn=>{
    const v=btn.dataset.v;
    if(v===q.correct)btn.classList.add('correct');
    else if(status==="incorrect"&&v===userAnswer)btn.classList.add('wrong');

/* 書き取り：正解=赤文字 / 不正解=入力(青)+正解(赤) / わからない・時間切れ=正解(赤)のみ */
function writingAnsHTML(status,q,userAnswer){
  const ko=esc(q.word.ko);
  if(status==="incorrect"){
    return `<div class="ovans">
      <div class="oa-row"><div class="oa-lab">入力</div><div class="oa-ko wrong">${esc(userAnswer)||"（無回答）"}</div></div>
      <div class="oa-row"><div class="oa-lab">正解</div><div class="oa-ko correct">${ko}</div></div>
    </div>`;
  }
  // correct / unknown / timeout は韓国語の正解のみ（正解時は音声も再生）
  return `<div class="ovans"><div class="oa-ko correct">${ko}</div></div>`;
}
function afterAnswer(){
  if(state.idx>=11){finishTest();return;}
  state.idx++;renderQuestion();
}

/* ============================================================ キーボード ============================================================ */
const KB_ROWS=[["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅛ","ㅕ","ㅑ","ㅐ","ㅔ"],["ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅗ","ㅓ","ㅏ","ㅣ"],["ㅋ","ㅌ","ㅊ","ㅍ","ㅠ","ㅜ","ㅡ"]];
/* Shiftなしで直接入力できる専用行：濃音 → 合成母音(旧Shift) → その他の合成母音 */
const KB_EXTRA_ROWS=[
  ["ㄲ","ㄸ","ㅃ","ㅆ","ㅉ","ㅒ","ㅖ"],       // 濃音 + 合成母音（旧Shift）を1行に
  ["ㅘ","ㅙ","ㅚ","ㅝ","ㅞ","ㅟ","ㅢ"]        // その他の合成母音
];
/* Shift・Spaceキーは廃止。濃音/合成母音は専用キー(KB_EXTRA_ROWS)で直接入力する */
function keyboardHTML(){
  let h='<div class="korean-keyboard" id="kbd">';
  KB_ROWS.forEach(row=>{
    h+='<div class="krow">';
    row.forEach(k=>h+=`<button class="key" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    h+='</div>';
  });
  KB_EXTRA_ROWS.forEach(row=>{
    h+='<div class="krow extra">';
    row.forEach(k=>h+=`<button class="key ex" data-k="${k}" onclick="kbKey('${k}')">${k}</button>`);
    h+='</div>';
  });
  // 操作行：わからない(左) / 回答する(中央・大) / ⌫(右)。Clearは廃止
  h+=`<div class="krow ctrl">
    <button class="key dontknow" onclick="submit('unknown','')">わからない</button>
    <button class="key send" onclick="kbSend()">回答する</button>
    <button class="key fn" onclick="kbBack()">⌫</button>
  </div></div>`;
  return h;
}
function kbKey(base){IME.input(base);refreshInput();}
function kbBack(){IME.backspace();refreshInput();}
function kbSend(){
  const q=state.questions[state.idx];const ans=IME.text().trim();
  // Spaceキー廃止のため空白は無視。キーボードで打てない記号(〜等)も無視して判定
  const norm=s=>s.replace(/[\s~〜・･]/g,"");
  submit(norm(ans)===norm(q.correct)?"correct":"incorrect",ans);
}
function refreshInput(){const el=document.getElementById("winput");if(!el)return;const t=IME.text();el.innerHTML=esc(t)+'<span class="wcaret"></span>';}

/* ============================================================ 結果画面 ============================================================ */
function finishTest(){
  const R=state.results,totalRaw=R.reduce((a,r)=>a+r.score,0),total=Math.ceil(totalRaw),rank=rankFor(total); // 小数は切り上げ
  const totalDisp=total;
  const nCorrect=R.filter(r=>r.isCorrect).length,nWrong=12-nCorrect;
  let perfect=getPerfectCount();if(total===100)perfect=incPerfectCount();
  if(!state.isReview)updateSectionRank(curSection,rank); // 過去最高ランクを上回った場合のみ更新
  // 今回の変化（記憶コンディション・要復習語数・単語別変化）を保存
  const nowMs=Date.now();
  const changes=R.map(r=>({id:r.wordId,ko:r.korean,ja:r.japanese,before:Math.round(r.memoryScoreBefore),after:Math.round(r.memoryScoreAfter)}));
  saveSession({at:new Date().toISOString(),before:state.conditionBefore,after:Math.round(overallCondition(nowMs)),
    reviewBefore:state.reviewBefore,reviewAfter:reviewNeedCount(nowMs),
    improved:changes.filter(c=>c.after>c.before).length,changes});
  // タイプ診断を再計算し外枠色を更新（テスト終了時のみ。回答中は更新しない）
  const dg=updateDiagnosis();
  _lastResult={total:totalDisp,rank,nCorrect,code:(dg&&dg.diag&&dg.diag.code)||""};
  track("test_complete",{score:totalDisp,rank:rank,correct:nCorrect});
  const typeUpd=(dg.changed&&dg.prevCode&&dg.prevCode!==dg.diag.code)
    ?`<div class="type-upd">WORD TYPE UPDATED　<b>${esc(dg.prevCode)} → ${esc(dg.diag.code)}</b></div>`:"";
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  const rows=R.map(r=>{
    const sy=SYM[r.answerStatus]||["−",""];
    const hb=r.isHintProvided?'<span class="hint-badge">ヒント</span>':"";
    const dAfter=(r.displayMemoryScoreAfter!=null?r.displayMemoryScoreAfter:(r.displayMemoryScoreAfterDecay!=null?r.displayMemoryScoreAfterDecay:r.memoryScoreAfter))||0;
    const dBefore=(r.displayMemoryScoreBefore!=null?r.displayMemoryScoreBefore:r.memoryScoreBefore)||0;
    const dlt=Math.round(dAfter-dBefore);
    return `<tr><td class="no">${r.questionNumber}</td><td class="ko">${esc(r.korean)}</td><td>${esc(r.japanese)}</td><td style="color:${sy[1]};font-weight:900">${sy[0]}${hb}</td><td class="num" style="color:${dlt>=0?"#1FAD62":"#FF6B6B"};font-weight:800">${dlt>0?"+":""}${dlt}</td></tr>`;
  }).join("");
  const _ri=roomInfoFor(curSection),pwrAfter=_ri.pwr,pwrBefore=(state.roomPwrBefore!=null?state.roomPwrBefore:0),pwrDelta=pwrAfter-pwrBefore; // そのROOMのPWR
  enqueuePresent(rank,pwrDelta); // このテストのプレゼント（レベル/ランク/PWR/レインボー）を1個追加
  checkAchievements();
  document.getElementById("s-result").innerHTML=`
   <div class="res">
    <div class="res-head">
      <div class="res-top">
        <div class="rank-c" style="background:${RANK_COLORS[rank]||"#555"}">${rank}</div>
        <div class="res-right">
          <div class="res-score">${totalDisp}<span> / 100</span></div>
          <div class="res-counts"><span style="color:#FF3B3B">○ ${nCorrect}</span><span style="color:#2F6FE0">× ${nWrong}</span></div>
        </div>
      </div>
      <div class="res-pwr"><span class="pwr-lab">PWR</span><div class="pwr-g"><div id="res-pwrfill" style="background:#00FF37;width:${pwrBefore}%"></div></div><span class="pwr-val">${pwrAfter}%</span><span class="pwr-delta" style="color:${pwrDelta>=0?"#1FAD62":"#FF6B6B"}">${pwrDelta>0?"+":""}${pwrDelta}</span></div>
    </div>
    ${typeUpd}
    <div class="res-listwrap">
      <table class="rtab"><thead><tr><th class="no">No.</th><th>韓国語</th><th>日本語</th><th>結果</th><th class="num">変化</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="res-btns">
      <button class="btn dark full" onclick="shareResult()" style="border:1px solid var(--gold);color:var(--gold)">&#120143; 結果をシェアして友達に挑戦</button>
      <button class="btn dark" onclick="startTest()">もう一度挑戦する</button>
      <button class="btn dark" onclick="renderRoomCurve()">PWRメータを見る</button>
      <button class="btn line full" onclick="show('s-home')">ホームに戻る</button>
      ${donateBtnHTML('btn line full')}
      ${installBtnHTML()}
    </div>
    ${adSlotHTML()}
   </div>`;
  show("s-result");
  activateAds(document.getElementById("s-result"));
  // PWRが増える演出（前値→後値へフィルがアニメーション）
  const pf=document.getElementById("res-pwrfill");
  if(pf)setTimeout(()=>{pf.style.width=pwrAfter+"%";},150);
}
