function wdHistRows(wordId){
  const recs=loadHistory().filter(r=>r.wordId===wordId).sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  return recs.map(r=>{
    const IC=c=>`<img class="dicon" src="emoji/${c}.svg" alt="">`;
    const dir=(r.answerType==="writing"?IC("270d"):(r.direction==="kr_to_jp"?IC("1f1f0-1f1f7"):IC("1f1ef-1f1f5")))+(r.isHintProvided?IC("1f4a1"):"");
    const mem=(r.displayMemoryScoreAfterDecay!=null)?r.displayMemoryScoreAfterDecay:"—";
    const sy=SYM[r.answerStatus]||["－",""];
    return `<tr><td>${fmtDate(r.answeredAt)}</td><td>${dir}</td><td style="color:${sy[1]};font-weight:900">${sy[0]}</td><td class="num">${(r.responseTimeMs/1000).toFixed(1)}</td><td class="num">${r.score}</td><td class="num">${mem}</td></tr>`;
  }).join("");
}

/* ============================================================ PWRメータ（記憶状態の可視化） ============================================================ */
function memState(rate){ // 状態ラベル
  if(rate>=80)return{label:"安定",cls:"ms-stable"};
  if(rate>=50)return{label:"復習推奨",cls:"ms-review"};
  return{label:"要復習",cls:"ms-urgent"};
}
/* 全体平均を時間軸で前方投影（学習直後→30日後） */
const PROJ=[{l:"直後",h:0},{l:"1h",h:1},{l:"6h",h:6},{l:"12h",h:12},{l:"1日",h:24},{l:"3日",h:72},{l:"7日",h:168},{l:"14日",h:336},{l:"30日",h:720}];
/* 過去1週間の実績（履歴から状態を復元）＋今後30日の予測を合成 */
function chartPoints(nowMs,words){
  const idset=new Set(words.map(w=>w.id)),byWord={};
  loadHistory().forEach(r=>{if(idset.has(r.wordId))(byWord[r.wordId]=byWord[r.wordId]||[]).push(r);});
  Object.values(byWord).forEach(a=>a.sort((x,y)=>String(x.answeredAt).localeCompare(String(y.answeredAt))));
  const pastAt=h=>{ // h時間前のPWR（記録を時刻Tまでリプレイ）
    const T=nowMs-h*3600000;let t=0;
    words.forEach(w=>{
      const recs=byWord[w.id]||[];let last=null;
      for(const r of recs){ if(new Date(r.answeredAt).getTime()>T)break; last=r; }
      if(last){
        const st={memoryScore:last.memoryScoreAfter!=null?last.memoryScoreAfter:0,formingScore:0,
          hasEverCorrect:last.memoryScoreAfter!=null&&last.memoryScoreAfter>0&&(last.firstCorrectAt!=null||last.isCorrect||last.memoryScoreAfter>=45),
          stabilityHours:last.stabilityHoursAfter!=null?last.stabilityHoursAfter:MEMORY_CONFIG.initialStabilityHours,
          wordDifficulty:last.wordDifficultyAfter!=null?last.wordDifficultyAfter:MEMORY_CONFIG.defaultWordDifficulty,
          lastReviewedAt:last.answeredAt,wordId:w.id};
        t+=displayMemoryScore(st,T);
      }
    });
    return t/Math.max(1,words.length);
  };
  const s=loadStats();
  const nowRate=words.reduce((a,w)=>a+displayMemoryScore(getStat(w.id,s),nowMs),0)/Math.max(1,words.length);
  const fut=h=>{let t=0;words.forEach(w=>{const st=getStat(w.id,s);t+=displayMemoryScore(st,nowMs)*Math.exp(-h/effectiveStability(st,nowMs));});return t/Math.max(1,words.length);};
  const pts=[];
  for(let d=7;d>=1;d--)pts.push({label:"-"+d,rate:pastAt(24*d)});
  pts.push({label:"今",rate:nowRate});
  [["+1",24],["+3",72],["+7",168],["+14",336],["+30",720]].forEach(([l,h])=>pts.push({label:l,rate:fut(h)}));
  return pts.map((p,i)=>({i,label:p.label,rate:p.rate}));
}
function projectionPoints(nowMs,words){
  const s=loadStats(),list=words||WORDS;
  return PROJ.map((p,i)=>{
    let t=0;list.forEach(w=>{const st=getStat(w.id,s);t+=displayScore(st,nowMs)*Math.exp(-p.h/Math.max(1,stabilityHours(st)));});
    return{i,label:p.l,rate:t/Math.max(1,list.length)};
  });
}
/* 各単語が記憶率70%を下回るまでの時間(h)。既に70%未満は0 */
function hoursTo70(st,nowMs){
  const cur=displayScore(st,nowMs);
  if(cur<=70)return 0;
  return Math.max(1,stabilityHours(st))*Math.log(cur/70);
}
function memChart(pts){
  const W=320,H=180,padL=25,padB=26,padT=8,padR=4,innerW=W-padL-padR,innerH=H-padT-padB;
  const x=i=>padL+innerW*(i/(pts.length-1)),y=r=>padT+innerH*(1-r/100);
  let grid="",lbl="";
  [0,25,50,75,100].forEach(v=>{const yy=y(v);grid+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="rgba(255,255,255,.30)" stroke-width="1"/><text x="${padL-4}" y="${yy+3}" fill="rgba(255,255,255,.85)" font-size="8" font-weight="700" text-anchor="end">${v}</text>`;});
  pts.forEach((p,i)=>{lbl+=`<text x="${x(i)}" y="${H-padB+14}" fill="rgba(255,255,255,.9)" font-size="8" font-weight="700" text-anchor="middle">${p.label}</text>`;});
  const poly=pts.map(p=>`${x(p.i)},${y(p.rate)}`).join(" ");
  let dots="";pts.forEach(p=>{dots+=`<circle cx="${x(p.i)}" cy="${y(p.rate)}" r="2.6" fill="#00E650"/>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><line x1="${padL}" y1="${y(70)}" x2="${W-padR}" y2="${y(70)}" stroke="#FFD84D" stroke-width="1.4" stroke-dasharray="3 3"/>${grid}<polyline class="grow" points="${poly}" fill="none" stroke="#00E650" stroke-width="2.4"/>${dots}${lbl}</svg>`;
}

/* PWRメータ: 左右スワイプで 全体(最左) → ROOM01..NN を移動。各スライドは遅延レンダリング */
let _curveIdx=0;
function curveForecastBlock(now,words){
  const s=loadStats();
  const arr=words.map(w=>({w,h:hoursTo70(getStat(w.id,s),now)})).sort((a,b)=>a.h-b.h);
  const today=arr.filter(a=>a.h<=24).length,tom=arr.filter(a=>a.h>24&&a.h<=48).length,d3c=arr.filter(a=>a.h>48&&a.h<=72).length;
  const cards=`<div class="curve-stats">
      <div class="cstat"><div class="k">今日中に復習</div><div class="v ms-urgent">${today}語</div></div>
      <div class="cstat"><div class="k">明日までに復習</div><div class="v ms-review">${tom}語</div></div>
      <div class="cstat"><div class="k">3日以内に復習</div><div class="v">${d3c}語</div></div>
    </div>`;
  return `<div class="tdetail-sec"><div class="h">復習予報</div>${cards}</div>`;
}
function curveSlideHTML(i,now){
  const meter=c=>`<div class="cond pwrline" style="margin:2px 0 12px"><span class="pwr-lab">PWR</span><div class="pwr-g"><div style="background:#00FF37;width:${c}%"></div></div><span class="pwr-val">${c}%</span></div>`;
  if(i===0){ // 最左=全体
    const st=loadStats();
    const learned=Object.keys(st).map(id=>WORD_BY_ID[id]).filter(Boolean);
    const base=learned.length?learned:WORDS;
    return `<div class="mpanel"><div class="cs-head">全体</div>${meter(pwrOverall())}</div>${curveOverall(now,base)}${curveForecastBlock(now,base)}`;
  }
  const nn=String(i).padStart(2,"0");
  const words=(LEVEL_SECTIONS[curLevel][i]||[]).map(id=>WORD_BY_ID[id]);
  const st2=loadStats();let t=0;words.forEach(w=>t+=displayScore(getStat(w.id,st2),now));
  const cond=Math.round(t/Math.max(1,words.length));
  return `<div class="mpanel"><div class="cs-head">ROOM ${nn}</div>${meter(cond)}</div>${curveOverall(now,words)}${curveForecastBlock(now,words)}`;
}
function renderCurveCarousel(){
  const N=LEVEL_INFO[curLevel].count;
  // 各スライドが自分の背景色を持つフルブリード構成（色の区切れ目がスワイプに追従）
  const slides=Array.from({length:N+1},(_,i)=>`<div class="curve-slide" data-i="${i}" style="background:${i>0?roomBg(i):LEVEL_SLIDE_BG}"><div class="curve-slide-in" id="cs-${i}"></div></div>`).join("");
  document.getElementById("s-curve").innerHTML=`
   <div class="page" style="padding-left:0;padding-right:0">
    <div class="page-head" style="padding:0 16px"><button class="back" onclick="show('s-home')">‹</button><h2>PWRメータ</h2></div>
    <div class="curve-scroll" id="curve-scroll">${slides}</div>
   </div>`;
  const now=Date.now();
  const fill=i=>{const e=document.getElementById("cs-"+i);if(e&&!e.dataset.f){e.dataset.f="1";e.innerHTML=curveSlideHTML(i,now);}};
  fill(_curveIdx);fill(Math.max(0,_curveIdx-1));fill(Math.min(N,_curveIdx+1));
  _roomCurveMode=_curveIdx>0;
  show("s-curve");
  const sc=document.getElementById("curve-scroll");
  sc.scrollLeft=_curveIdx*sc.clientWidth;
  let t2=null;
  sc.addEventListener("scroll",()=>{clearTimeout(t2);t2=setTimeout(()=>{
    const i=Math.max(0,Math.min(N,Math.round(sc.scrollLeft/sc.clientWidth)));
    _curveIdx=i;_roomCurveMode=i>0;
    fill(i);fill(Math.max(0,i-1));fill(Math.min(N,i+1));
    applyBgAll(i>0?roomBg(i):LEVEL_SLIDE_BG); // スライドに応じて背景色も切替
  },90);});
}
function renderCurve(){_curveIdx=0;renderCurveCarousel();}
function curveOverall(now,words){
  return `<div class="chartbox">${memChart(chartPoints(now,words))}</div>
    <div style="background:rgba(255,255,255,.92);color:#1a1a1a;font-weight:700;font-size:11.5px;line-height:1.7;margin-top:8px;padding:9px 11px">※ 横軸＝過去1週間の実績（日）と今後の予測，縦軸＝推定記憶率。黄色の点線=70%ライン。</div>`;
}
function curveWords(now,words){ // ROOMボードの単語表と同じUI（番号・韓・日・記憶）
  const s=loadStats();
  const rows=(words||WORDS).map((w,i)=>{
    const st=getStat(w.id,s),no=String(i+1).padStart(3,"0");
    if(st.lastReviewedAt){
      const rate=Math.round(displayScore(st,now)),ms=memState(rate);
      return `<div class="wl-row" onclick="renderWordDetail(${w.id})"><span class="wl-no">${no}</span><span class="wl-ko">${esc(w.ko)}</span><span class="wl-ja">${esc(w.ja)}</span><span class="wl-rate ${ms.cls}">${rate}</span></div>`;
    }
    return `<div class="wl-row wl-un"><span class="wl-no">${no}</span><span class="wl-ko">${esc(w.ko)}</span><span class="wl-ja">${esc(w.ja)}</span><span class="wl-rate">未</span></div>`;
  }).join("");
  return `<div class="curve-words"><div class="wl-head"><span class="wl-no">No.</span><span class="wl-ko">韓国語</span><span class="wl-ja">日本語</span><span class="wl-rate">記憶</span></div>${rows}</div>`;
}
function startReviewTest(ids){curLevel="middle";curSection=1;startTest(ids);} // 復習予報は中級Section01(基本100語)ベース

/* ============================================================ 過去のテスト結果画面 ============================================================ */
function renderPastResult(testId){
  const R=loadHistory().filter(r=>r.testId===testId).sort((a,b)=>a.answeredAt.localeCompare(b.answeredAt));
  if(!R.length)return;
  const total=Math.ceil(R.reduce((a,r)=>a+(r.score||0),0)),rank=R.length>=12?rankFor(total):null;
  const totalDisp=total;
  const nCorrect=R.filter(r=>r.isCorrect).length,nWrong=R.length-nCorrect;
  const SYM={correct:["○","#FF3B3B"],incorrect:["×","#2F6FE0"],unknown:["－","rgba(255,255,255,.75)"],timeout:["△","#DFB10F"]};
  const rows=R.map((r,i)=>{
    const sy=SYM[r.answerStatus]||["－",""];
    const hb=r.isHintProvided?'<span class="hint-badge">ヒント</span>':"";
    const dAfter=(r.displayMemoryScoreAfter!=null?r.displayMemoryScoreAfter:(r.displayMemoryScoreAfterDecay!=null?r.displayMemoryScoreAfterDecay:r.memoryScoreAfter))||0;
    const dBefore=(r.displayMemoryScoreBefore!=null?r.displayMemoryScoreBefore:r.memoryScoreBefore)||0;
    const dlt=Math.round(dAfter-dBefore);
    return `<tr><td class="no">${r.questionNumber||i+1}</td><td class="ko">${esc(r.korean)}</td><td>${esc(r.japanese)}</td><td style="color:${sy[1]};font-weight:900">${sy[0]}${hb}</td><td class="num" style="color:${dlt>=0?"#1FAD62":"#FF6B6B"};font-weight:800">${dlt>0?"+":""}${dlt}</td></tr>`;
  }).join("");
  document.getElementById("s-result").innerHTML=`
   <div class="res">
    <div class="page-head" style="flex:0 0 auto;margin-bottom:4px"><button class="back" onclick="show('s-home')">‹</button><h2>過去の結果</h2></div>
    <div class="res-head">
      <div class="res-top">
        <div class="rank-c" style="background:${rank?(RANK_COLORS[rank]||"#555"):"rgba(0,0,0,.22)"}">${rank||"-"}</div>
        <div class="res-right">
          <div class="res-score">${totalDisp}<span> / 100</span></div>
          <div class="res-counts"><span style="color:#FF3B3B">○ ${nCorrect}</span><span style="color:#2F6FE0">× ${nWrong}</span></div>
        </div>
      </div>
    </div>
    <div class="res-listwrap">
      <table class="rtab"><thead><tr><th class="no">No.</th><th>韓国語</th><th>日本語</th><th>結果</th><th class="num">変化</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="res-btns"><button class="btn line full" onclick="show('s-home')">ホームに戻る</button></div>
   </div>`;
  show("s-result");
}

function renderRoomCurve(){_curveIdx=curSection;renderCurveCarousel();}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
/* バージョン表示（トップページ） */
const APP_VERSION="v2.52.1 (2026-07-19)";
(function(){const el=document.getElementById("appver");if(el)el.textContent=APP_VERSION;})();
getUserId();
/* ============================================================ 収益化（投げ銭＋AdSense）。IDを入れるまで何も表示・読込しない ============================================================ */
const MONETIZE={
  donateUrl:"https://ko-fi.com/ktango",  // Ko-fi 投げ銭ページ
  donateLabel:"☕ 応援する（投げ銭）",
  adsenseClient:"ca-pub-7581865183013796",  // YudaiMikami7 / k-tango

};
let _adsLoaded=false;
function ensureAdsense(){
  if(_adsLoaded||!MONETIZE.adsenseClient)return;

  if(document.querySelector('script[src*="adsbygoogle.js"]'))return; // <head>で読込済みなら何もしない

/* 指定要素にレスポンシブ広告を描画（IDが揃っているときだけ） */
function adSlotHTML(){
  if(!MONETIZE.adsenseClient||!MONETIZE.adsenseSlot)return "";
  return `<div class="ad-wrap"><ins class="adsbygoogle" style="display:block" data-ad-client="${MONETIZE.adsenseClient}" data-ad-slot="${MONETIZE.adsenseSlot}" data-ad-format="auto" data-full-width-responsive="true"></ins></div>`;
}
function activateAds(root){
  if(!MONETIZE.adsenseClient)return;
  ensureAdsense();
  try{(root||document).querySelectorAll(".adsbygoogle:not([data-done])").forEach(el=>{el.setAttribute("data-done","1");(window.adsbygoogle=window.adsbygoogle||[]).push({});});}catch(e){}
}
/* 画面下部の固定広告フッター：広告が実際に配信されたときだけ表示し、
   その高さ分scaleHomeでアプリを縮小してスタートボタン等が隠れないようにする */
function initFooterAd(){
  if(!MONETIZE.adsenseClient||!MONETIZE.footerSlot)return;
  const css=document.createElement("style");
  css.textContent="#ad-footer{position:fixed;left:0;right:0;bottom:0;z-index:900;display:none;justify-content:center;align-items:center;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.15);padding-bottom:env(safe-area-inset-bottom)}body.has-adfooter #ad-footer{display:flex}";
  document.head.appendChild(css);
  const f=document.createElement("div");f.id="ad-footer";
  f.innerHTML=`<ins class="adsbygoogle" style="display:inline-block;width:100%;max-width:728px;height:50px" data-ad-client="${MONETIZE.adsenseClient}" data-ad-slot="${MONETIZE.footerSlot}"></ins>`;
  document.body.appendChild(f);
  ensureAdsense();
  const ins=f.querySelector("ins");
  try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  new MutationObserver(()=>{
    document.body.classList.toggle("has-adfooter",ins.getAttribute("data-ad-status")==="filled");
    scaleHome();
  }).observe(ins,{attributes:true,attributeFilter:["data-ad-status"]});
}
initFooterAd();
function donateBtnHTML(cls){
  if(!MONETIZE.donateUrl)return "";
  return `<a class="${cls||'btn line full'}" href="${MONETIZE.donateUrl}" target="_blank" rel="noopener" onclick="track(&quot;donate_click&quot;)" style="text-decoration:none;display:flex;align-items:center;justify-content:center">${MONETIZE.donateLabel}</a>`;

/* ===== シェア・PWA誘導・計測フック ===== */
const track=window.track||function(){};
let _lastResult=null,_bipEvt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();_bipEvt=e;});
function shareResult(){

function installBtnHTML(){
  if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)return "";

function promptInstall(){

function saveSettings(o){localStorage.setItem(LS_SETTINGS,JSON.stringify(o));}
